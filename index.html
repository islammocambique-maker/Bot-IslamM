<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Islam M Bot - Guia Islamico</title>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0d3b2e 0%, #1a5c47 50%, #0d3b2e 100%);
            min-height: 100vh;
            color: #fff;
            overflow-x: hidden;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 15px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .header {
            text-align: center;
            padding: 20px 0;
            border-bottom: 2px solid rgba(212,175,55,0.5);
            margin-bottom: 15px;
        }

        .header h1 { font-size: 2rem; color: #d4af37; }

        .chat-area {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .message {
            max-width: 85%;
            padding: 12px 16px;
            border-radius: 18px;
            line-height: 1.5;
        }

        .bot-msg {
            align-self: flex-start;
            background: rgba(255,255,255,0.12);
            border: 1px solid rgba(212,175,55,0.3);
        }

        .user-msg {
            align-self: flex-end;
            background: #d4af37;
            color: #0d3b2e;
            font-weight: 600;
        }

        .input-area {
            display: flex;
            gap: 10px;
            padding: 15px 0;
            border-top: 2px solid rgba(212,175,55,0.3);
        }

        .input-area input {
            flex: 1;
            padding: 14px;
            border-radius: 25px;
            border: 2px solid rgba(212,175,55,0.4);
            background: rgba(255,255,255,0.1);
            color: #fff;
            outline: none;
        }

        .send-btn {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: none;
            background: linear-gradient(135deg, #d4af37, #c9a227);
            cursor: pointer;
            font-size: 1.2rem;
        }

        .quick-buttons {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: center;
            padding: 10px 0;
        }

        .quick-btn {
            background: rgba(212,175,55,0.15);
            border: 1px solid rgba(212,175,55,0.3);
            color: #d4af37;
            padding: 8px 12px;
            border-radius: 20px;
            cursor: pointer;
        }
    </style>
</head>

<body>
<div class="container">

    <div class="header">
        <h1>🕌 Islam M Bot</h1>
        <p>Seu guia islâmico</p>
    </div>

    <div class="quick-buttons" id="quickButtons">
        <button class="quick-btn" data-action="salat">🕐 Salat</button>
        <button class="quick-btn" data-action="quran1">📖 1:1</button>
        <button class="quick-btn" data-action="islam">☪️ Islam</button>
        <button class="quick-btn" data-action="wudu">💧 Wudu</button>
    </div>

    <div class="chat-area" id="chatArea">
        <div class="message bot-msg">
            As-salamu alaykum 🌙<br>Escreve uma pergunta abaixo.
        </div>
    </div>

    <div class="input-area">
        <input type="text" id="userInput" placeholder="Digite sua pergunta...">
        <button class="send-btn" id="sendBtn">➤</button>
    </div>

</div>

<script>
document.addEventListener("DOMContentLoaded", function () {

    const chatArea = document.getElementById("chatArea");
    const userInput = document.getElementById("userInput");
    const sendBtn = document.getElementById("sendBtn");
    const quickButtons = document.getElementById("quickButtons");

    function addMessage(text, isUser) {
        const div = document.createElement("div");
        div.className = "message " + (isUser ? "user-msg" : "bot-msg");
        div.textContent = text;
        chatArea.appendChild(div);
        chatArea.scrollTop = chatArea.scrollHeight;
    }

    function sendMessage() {
        const text = userInput.value.trim();
        if (!text) return;

        addMessage(text, true);
        userInput.value = "";

        setTimeout(() => {
            addMessage("Resposta automática: " + text, false);
        }, 500);
    }

    // ✅ BOTÃO FUNCIONA AQUI (CORRIGIDO)
    sendBtn.addEventListener("click", function () {
        sendMessage();
    });

    // Enter
    userInput.addEventListener("keydown", function (e) {
        if (e.key === "Enter") sendMessage();
    });

    // Quick buttons
    quickButtons.addEventListener("click", function (e) {
        const btn = e.target.closest(".quick-btn");
        if (!btn) return;

        const action = btn.dataset.action;

        const map = {
            salat: "horario salat",
            quran1: "Alcorão 1:1",
            islam: "o que é islam",
            wudu: "como fazer wudu"
        };

        userInput.value = map[action] || "";
        sendMessage();
    });

});
</script>

</body>
</html>
