<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Islam M - Chat Bot Inteligente</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a5f2a 0%, #0d3b1a 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 10px;
        }

        .chat-container {
            width: 100%;
            max-width: 500px;
            height: 90vh;
            background: #fff;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .chat-header {
            background: linear-gradient(135deg, #2e8b57 0%, #1a5f2a 100%);
            color: white;
            padding: 20px;
            text-align: center;
        }

        .chat-header h1 {
            font-size: 1.5rem;
            margin-bottom: 5px;
        }

        .chat-header p {
            font-size: 0.8rem;
            opacity: 0.9;
        }

        .chat-header .status {
            font-size: 0.75rem;
            margin-top: 8px;
            padding: 4px 12px;
            background: rgba(255,255,255,0.2);
            border-radius: 20px;
            display: inline-block;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            background: #f5f5f5;
        }

        .message {
            margin-bottom: 15px;
            max-width: 85%;
            padding: 12px 16px;
            border-radius: 18px;
            font-size: 0.95rem;
            line-height: 1.5;
            word-wrap: break-word;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.bot {
            background: white;
            color: #333;
            border-bottom-left-radius: 4px;
            margin-right: auto;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .message.user {
            background: #2e8b57;
            color: white;
            border-bottom-right-radius: 4px;
            margin-left: auto;
        }

        .message.bot .sender {
            font-size: 0.75rem;
            color: #2e8b57;
            font-weight: bold;
            margin-bottom: 4px;
        }

        .message.user .sender {
            font-size: 0.75rem;
            color: rgba(255,255,255,0.8);
            font-weight: bold;
            margin-bottom: 4px;
        }

        .loading-dots {
            display: inline-flex;
            gap: 4px;
        }

        .loading-dots span {
            width: 8px;
            height: 8px;
            background: #2e8b57;
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out both;
        }

        .loading-dots span:nth-child(1) { animation-delay: -0.32s; }
        .loading-dots span:nth-child(2) { animation-delay: -0.16s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }

        .chat-input-area {
            padding: 15px;
            background: white;
            border-top: 1px solid #e0e0e0;
            display: flex;
            gap: 10px;
        }

        .chat-input {
            flex: 1;
            padding: 12px 18px;
            border: 2px solid #e0e0e0;
            border-radius: 25px;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.3s;
        }

        .chat-input:focus {
            border-color: #2e8b57;
        }

        .chat-input:disabled {
            background: #f0f0f0;
            cursor: not-allowed;
        }

        .send-btn {
            width: 50px;
            height: 50px;
            border: none;
            border-radius: 50%;
            background: #2e8b57;
            color: white;
            font-size: 1.2rem;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .send-btn:hover:not(:disabled) {
            background: #1a5f2a;
            transform: scale(1.05);
        }

        .send-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .footer {
            text-align: center;
            padding: 10px;
            background: #1a5f2a;
            color: white;
            font-size: 0.75rem;
        }

        .footer a {
            color: #90ee90;
            text-decoration: none;
        }

        /* Scrollbar customizada */
        .chat-messages::-webkit-scrollbar {
            width: 6px;
        }

        .chat-messages::-webkit-scrollbar-track {
            background: #f1f1f1;
        }

        .chat-messages::-webkit-scrollbar-thumb {
            background: #2e8b57;
            border-radius: 3px;
        }

        /* Responsivo */
        @media (max-width: 480px) {
            .chat-container {
                height: 100vh;
                border-radius: 0;
            }
            body {
                padding: 0;
            }
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">
            <h1>🕌 Islam M</h1>
            <p>Chat Bot Inteligente sobre o Islam</p>
            <div class="status" id="status">⏳ Carregando cérebro...</div>
        </div>

        <div class="chat-messages" id="chatMessages">
            <!-- Mensagens aparecem aqui -->
        </div>

        <div class="chat-input-area">
            <input 
                type="text" 
                class="chat-input" 
                id="userInput" 
                placeholder="Escreva a sua pergunta..." 
                disabled
            >
            <button class="send-btn" id="sendBtn" disabled>➤</button>
        </div>

        <div class="footer">
            Criado por <strong>isslam Moz</strong> | Suporte: 860407269 | 
            <a href="#" onclick="mostrarApoio(); return false;">💚 Apoiar Projeto</a>
        </div>
    </div>

    <!-- Carrega o config.js primeiro -->
    <script src="config.js"></script>

    <script>
        // ============================================
        // VARIÁVEIS GLOBAIS
        // ============================================
        const chatMessages = document.getElementById('chatMessages');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');
        const statusDiv = document.getElementById('status');

        let cerebroPronto = false;

        // ============================================
        // INICIALIZAÇÃO
        // ============================================
        async function iniciarBot() {
            // Mostra mensagem de boas-vindas
            adicionarMensagemBot(getBoasVindas());

            // Tenta carregar o cérebro
            const sucesso = await carregarCerebro();

            if (sucesso) {
                cerebroPronto = true;
                statusDiv.textContent = `✅ Online! ${cerebro.length} conhecimentos carregados`;
                statusDiv.style.background = 'rgba(46, 139, 87, 0.3)';
                habilitarInput();
            } else {
                // Se falhar carregar cérebro, tenta usar Gemini direto
                statusDiv.textContent = '⚠️ Cérebro offline - Usando IA Gemini';
                statusDiv.style.background = 'rgba(255, 165, 0, 0.3)';
                cerebroPronto = false;
                habilitarInput();
            }
        }

        // ============================================
        // FUNÇÕES DA UI
        // ============================================

        function habilitarInput() {
            userInput.disabled = false;
            sendBtn.disabled = false;
            userInput.focus();
        }

        function desabilitarInput() {
            userInput.disabled = true;
            sendBtn.disabled = true;
        }

        function adicionarMensagemBot(texto) {
            const div = document.createElement('div');
            div.className = 'message bot';
            div.innerHTML = `
                <div class="sender">🕌 Islam M</div>
                <div>${formatarTexto(texto)}</div>
            `;
            chatMessages.appendChild(div);
            scrollToBottom();
        }

        function adicionarMensagemUser(texto) {
            const div = document.createElement('div');
            div.className = 'message user';
            div.innerHTML = `
                <div class="sender">Você</div>
                <div>${formatarTexto(texto)}</div>
            `;
            chatMessages.appendChild(div);
            scrollToBottom();
        }

        function adicionarMensagemCarregando() {
            const div = document.createElement('div');
            div.className = 'message bot';
            div.id = 'msgCarregando';
            div.innerHTML = `
                <div class="sender">🕌 Islam M</div>
                <div class="loading-dots">
                    <span></span><span></span><span></span>
                </div>
            `;
            chatMessages.appendChild(div);
            scrollToBottom();
        }

        function removerMensagemCarregando() {
            const msg = document.getElementById('msgCarregando');
            if (msg) msg.remove();
        }

        function formatarTexto(texto) {
            // Converte URLs em links clicáveis
            const urlRegex = /(https?:\/\/[^\s]+)/g;
            return texto
                .replace(urlRegex, '<a href="$1" target="_blank" style="color:#2e8b57;">$1</a>')
                .replace(/\n/g, '<br>');
        }

        function scrollToBottom() {
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        function mostrarApoio() {
            adicionarMensagemBot(getInfoApoio());
        }

        // ============================================
        // LÓGICA DO CHAT
        // ============================================

        async function enviarPergunta() {
            const pergunta = userInput.value.trim();
            if (!pergunta) return;

            // Limpa input e mostra pergunta do usuário
            userInput.value = '';
            adicionarMensagemUser(pergunta);

            // Mostra indicador de carregamento
            adicionarMensagemCarregando();
            desabilitarInput();

            try {
                // Processa a pergunta
                const resultado = await processarPergunta(pergunta);

                // Remove carregando e mostra resposta
                removerMensagemCarregando();

                if (resultado.origem === 'cerebro') {
                    adicionarMensagemBot(resultado.resposta);
                } else if (resultado.origem === 'gemini') {
                    adicionarMensagemBot('🤖 ' + resultado.resposta);
                } else {
                    adicionarMensagemBot(resultado.resposta);
                }

            } catch (erro) {
                removerMensagemCarregando();
                adicionarMensagemBot('❌ ' + CONFIG.MENSAGENS.ERRO);
                console.error(erro);
            }

            habilitarInput();
            userInput.focus();
        }

        // ============================================
        // EVENT LISTENERS
        // ============================================

        sendBtn.addEventListener('click', enviarPergunta);

        userInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') enviarPergunta();
        });

        // ============================================
        // INICIAR
        // ============================================
        iniciarBot();
    </script>
</body>
</html>
