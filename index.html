<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Islam M Bot</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: linear-gradient(180deg, #0d3b2e 0%, #1a5f4a 100%);
            min-height: 100vh;
            color: #fff;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 15px;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            text-align: center;
            padding: 15px 0;
            flex-shrink: 0;
        }

        .logo {
            font-size: 2.5rem;
        }

        h1 {
            font-size: 1.5rem;
            margin: 5px 0;
        }

        .status {
            color: #10b981;
            font-size: 0.85rem;
        }

        .chat-box {
            flex: 1;
            background: rgba(255,255,255,0.08);
            border-radius: 15px;
            padding: 15px;
            overflow-y: auto;
            margin: 10px 0;
        }

        .message {
            margin: 12px 0;
            padding: 12px 15px;
            border-radius: 12px;
            max-width: 85%;
            line-height: 1.6;
            font-size: 0.95rem;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.bot {
            background: rgba(16, 185, 129, 0.2);
            border-left: 3px solid #10b981;
            margin-right: auto;
        }

        .message.user {
            background: rgba(59, 130, 246, 0.2);
            border-right: 3px solid #3b82f6;
            margin-left: auto;
            text-align: right;
        }

        .message .time {
            font-size: 0.7rem;
            color: #a8e6cf;
            margin-top: 5px;
        }

        .message code {
            background: rgba(0,0,0,0.3);
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 0.9em;
        }

        .message pre {
            background: rgba(0,0,0,0.2);
            padding: 10px;
            border-radius: 8px;
            overflow-x: auto;
            margin: 8px 0;
        }

        .quick-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin: 10px 0;
            flex-shrink: 0;
        }

        .quick-btn {
            padding: 8px 16px;
            border: 1px solid rgba(16, 185, 129, 0.4);
            border-radius: 20px;
            background: rgba(16, 185, 129, 0.1);
            color: #a8e6cf;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.2s;
        }

        .quick-btn:hover {
            background: rgba(16, 185, 129, 0.3);
            color: #fff;
        }

        .input-area {
            display: flex;
            gap: 10px;
            padding: 10px 0;
            flex-shrink: 0;
        }

        .input-area input {
            flex: 1;
            padding: 14px 18px;
            border: none;
            border-radius: 25px;
            background: rgba(255,255,255,0.12);
            color: #fff;
            font-size: 1rem;
            outline: none;
        }

        .input-area input::placeholder {
            color: #a8e6cf;
        }

        .input-area button {
            width: 50px;
            height: 50px;
            border: none;
            border-radius: 50%;
            background: #10b981;
            color: #fff;
            font-size: 1.3rem;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .input-area button:hover {
            background: #059669;
            transform: scale(1.05);
        }

        .input-area button:disabled {
            background: #6b7280;
            cursor: not-allowed;
            transform: none;
        }

        .loading {
            display: none;
            text-align: center;
            color: #a8e6cf;
            padding: 10px;
        }

        .loading.show {
            display: block;
        }

        .error {
            color: #f87171;
        }

        .verse-arabic {
            font-family: 'Traditional Arabic', 'Scheherazade', serif;
            font-size: 1.4rem;
            line-height: 2;
            text-align: right;
            direction: rtl;
            margin: 10px 0;
            padding: 10px;
            background: rgba(0,0,0,0.2);
            border-radius: 8px;
        }

        .prayer-time {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin: 10px 0;
        }

        .prayer-item {
            background: rgba(255,255,255,0.1);
            padding: 10px;
            border-radius: 8px;
            text-align: center;
        }

        .prayer-name {
            color: #a8e6cf;
            font-size: 0.85rem;
        }

        .prayer-hour {
            font-size: 1.2rem;
            font-weight: bold;
        }

        /* Scrollbar */
        .chat-box::-webkit-scrollbar {
            width: 6px;
        }

        .chat-box::-webkit-scrollbar-track {
            background: transparent;
        }

        .chat-box::-webkit-scrollbar-thumb {
            background: #10b981;
            border-radius: 3px;
        }

        @media (max-width: 600px) {
            .container {
                padding: 10px;
            }
            h1 {
                font-size: 1.2rem;
            }
            .message {
                max-width: 95%;
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">🌙</div>
            <h1>Islam M Bot</h1>
            <p class="status">● Online</p>
        </header>

        <div class="chat-box" id="chatBox">
            <div class="message bot">
                <strong>Assalamu Alaikum! 👋</strong><br><br>
                Sou seu assistente sobre Islam. Posso ajudar com:<br>
                • 📖 Versículos do Alcorão<br>
                • 🕌 Horários de oração<br>
                • 📜 Hadiths e Duãs<br>
                • 💧 Como fazer Wudhu<br>
                • 🙏 Como orar (Salat)<br><br>
                Use os botões rápidos ou digite sua pergunta!
            </div>
        </div>

        <div class="loading" id="loading">🌙 Buscando resposta...</div>

        <div class="quick-buttons">
            <button class="quick-btn" onclick="sendQuick('/quran 2:255')">📖 Alcorão</button>
            <button class="quick-btn" onclick="sendQuick('/salat')">🕌 Salat</button>
            <button class="quick-btn" onclick="sendQuick('/hadith')">📜 Hadith</button>
            <button class="quick-btn" onclick="sendQuick('/dua')">🤲 Duã</button>
            <button class="quick-btn" onclick="sendQuick('/wudhu')">💧 Wudhu</button>
            <button class="quick-btn" onclick="sendQuick('/ajuda')">❓ Ajuda</button>
        </div>

        <div class="input-area">
            <input 
                type="text" 
                id="userInput" 
                placeholder="Digite sua pergunta..."
                onkeypress="if(event.key==='Enter') sendMessage()"
            >
            <button onclick="sendMessage()" id="sendBtn">➤</button>
        </div>
    </div>

    <script>
        // ===== BANCO DE DADOS EMBUTIDO DO BOT =====
        
        const FAQ = {
            'o que é o islam': {
                text: `🌙 <strong>O QUE É O ISLAM?</strong><br><br>
                A palavra <strong>Islam</strong> vem da raiz árabe <em>s-l-m</em>, significando <strong>paz</strong> e <strong>submissão</strong>.<br><br>
                É a submissão voluntária à vontade de Deus (Allah), a mesma mensagem revelada a todos os profetas desde Adão até Muhammad ﷺ.<br><br>
                🌍 Seguido por mais de <strong>1.8 bilhão</strong> de pessoas — 25% da humanidade.`
            },
            'profeta': {
                text: `🕊️ <strong>PROFETA MUHAMMAD ﷺ</strong><br><br>
                Último profeta e mensageiro de Deus. Nasceu em Meca em 570 d.C.<br><br>
                • Conhecido como <em>Al-Amin</em> (O Confiável)<br>
                • Primeira revelação aos 40 anos<br>
                • Pregou por 23 anos com paciência<br><br>
                ❤️ Exemplo de honestidade, misericórdia e humildade.<br><br>
                <strong>Ele não é divino</strong> — é humano, como todos nós.`
            },
            'jesus': {
                text: `✝️🤝☪️ <strong>JESUS (ISA) NO ISLAM</strong><br><br>
                Sim! Os muçulmanos <strong>creem firmemente em Jesus</strong>!<br><br>
                ✅ <strong>Cremos que:</strong><br>
                • Jesus é um dos maiores profetas<br>
                • Nasceu da Virgem Maria (Mariam)<br>
                • Realizou milagres<br>
                • É o Messias (Al-Masih)<br>
                • Retornará no fim dos tempos<br><br>
                ❌ <strong>Mas NÃO cremos que:</strong><br>
                • É Deus ou filho de Deus<br>
                • Foi crucificado (foi elevado vivo)<br>
                • É parte de trindade`
            },
            'pilares': {
                text: `🕋 <strong>OS 5 PILARES DO ISLAM</strong><br><br>
                1️⃣ <strong>Shahada</strong> — Testemunho de fé<br>
                2️⃣ <strong>Salat</strong> — 5 orações diárias<br>
                3️⃣ <strong>Zakat</strong> — Caridade obrigatória (2.5%)<br>
                4️⃣ <strong>Sawm</strong> — Jejum no Ramadã<br>
                5️⃣ <strong>Hajj</strong> — Peregrinação a Meca`
            },
            'terrorista': {
                text: `🌍 <strong>OS MUÇULMANOS SÃO TERRORISTAS?</strong><br><br>
                <strong>Não.</strong> Terroristas não representam o Islam.<br><br>
                📊 <strong>Números:</strong><br>
                • 1.8 bilhão de muçulmanos no mundo<br>
                • Maioria das vítimas de terrorismo são <strong>próprios muçulmanos</strong><br><br>
                ❌ O Islam condena:<br>
                • Matar inocentes (Alcorão 5:32)<br>
                • Suicídio (Hadith autêntico)<br>
                • Corrupção na terra (5:33)`
            },
            'matar': {
                text: `⚖️ <strong>O ISLAM MANDA MATAR?</strong><br><br>
                <strong>Não.</strong> Esta é a maior falsa ideia sobre o Islam.<br><br>
                📖 <strong>O Alcorão diz:</strong><br>
                <em>"Quem matar uma pessoa inocente... é como se tivesse matado toda a humanidade"</em> (5:32)<br><br>
                <em>"Não há compulsão na religião"</em> (2:256)<br><br>
                ⚔️ Guerra só é permitida em <strong>defesa</strong>, com regras estritas: não matar civis, mulheres, crianças.`
            }
        };

        const HADITHS = [
            {
                text: `📜 <strong>HADITH</strong><br><br>
                📝 <em>Abu Hurairah</em><br>
                📚 Sahih Muslim<br><br>
                ❝ O Mensageiro de Allah ﷺ disse: <em>"Não sereis verdadeiros crentes até que tenhais misericórdia uns dos outros."</em> ❞`
            },
            {
                text: `📜 <strong>HADITH</strong><br><br>
                📝 <em>Aisha</em><br>
                📚 Sahih al-Bukhari<br><br>
                ❝ O Mensageiro de Allah ﷺ disse: <em>"Allah é Gentil e ama a gentileza em todos os assuntos."</em> ❞`
            },
            {
                text: `📜 <strong>HADITH</strong><br><br>
                📝 <em>Umar ibn al-Khattab</em><br>
                📚 Sahih al-Bukhari<br><br>
                ❝ Um homem perguntou: "Informe-me sobre o Islam." O Profeta ﷺ respondeu: <em>"Testemunhes que não há divindade exceto Allah e que Muhammad é o Mensageiro de Allah, establishes a oração, pagues o zakat, jejues o Ramadã e peregrines à Casa se tiveres meios."</em> ❞`
            }
        ];

        const DUAS = [
            {
                nome: 'Ao acordar',
                arabe: 'الْحَمْدُ لِلَّهِ الَّذِي أَحْيَانَا بَعْدَ مَا أَمَاتَنَا وَإِلَيْهِ النُّشُورُ',
                transliteracao: 'Alhamdu lillahi alladhi ahyana ba\'da ma amatana',
                portugues: 'Louvor a Deus que nos deu vida depois da morte, e a Ele é o retorno.'
            },
            {
                nome: 'Para conhecimento',
                arabe: 'رَبِّ زِدْنِي عِلْمًا',
                transliteracao: 'Rabbi zidni ilma',
                portugues: 'Meu Senhor, aumenta-me em conhecimento.'
            },
            {
                nome: 'Proteção',
                arabe: 'أَعُوذُ بِاللَّهِ مِنَ الشَّيْطَانِ الرَّجِيمِ',
                transliteracao: 'A\'udhu billahi minash-shaytanir-rajim',
                portugues: 'Busco proteção em Deus contra Satanás, o condenado.'
            }
        ];

        const WUDHU_STEPS = `💧 <strong>WUDHU (ABLUIÇÃO)</strong><br><br>
        <strong>Passos:</strong><br>
        1️⃣ Intenção no coração<br>
        2️⃣ Bismillah<br>
        3️⃣ Lavar mãos 3x<br>
        4️⃣ Enxaguar boca 3x<br>
        5️⃣ Lavar nariz 3x<br>
        6️⃣ Lavar rosto 3x<br>
        7️⃣ Lavar braços até cotovelos 3x<br>
        8️⃣ Passar mãos molhadas na cabeça<br>
        9️⃣ Limpar orelhas<br>
        🔟 Lavar pés até tornozelos 3x<br><br>
        ⚠️ <strong>Quebra o wudhu:</strong> relieve, sono profundo, perda de consciência`;

        const SALAT_STEPS = `🙏 <strong>COMO ORAR (SALAT)</strong><br><br>
        <strong>Pré-requisitos:</strong> wudhu válido, vestes limpas, lugar limpo, intenção<br><br>
        <strong>Passos:</strong><br>
        1️⃣ <strong>Takbir</strong> — "Allahu Akbar" (mãos levantadas)<br>
        2️⃣ <strong>Qiyam</strong> — Recitar Al-Fatiha + surata<br>
        3️⃣ <strong>Ruku'</strong> — Inclinar, mãos nos joelhos<br>
        4️⃣ <strong>Sujud</strong> — Prostrar, testa no chão<br>
        5️⃣ <strong>Julus</strong> — Sentar entre sujud<br>
        6️⃣ Repetir sujud<br>
        7️⃣ <strong>Tashahhud</strong> — Testemunho sentado<br>
        8️⃣ <strong>Salaam</strong> — "Assalamu alaikum" (virar cabeça)`;

        // ===== FUNÇÕES DO CHAT =====

        const chatBox = document.getElementById('chatBox');
        const userInput = document.getElementById('userInput');
        const loading = document.getElementById('loading');
        const sendBtn = document.getElementById('sendBtn');

        function getTime() {
            return new Date().toLocaleTimeString('pt-BR', {hour: '2-digit', minute: '2-digit'});
        }

        function addMessage(text, isBot) {
            const div = document.createElement('div');
            div.className = `message ${isBot ? 'bot' : 'user'}`;
            div.innerHTML = `${text}<div class="time">${getTime()}</div>`;
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function showLoading(show) {
            loading.classList.toggle('show', show);
            sendBtn.disabled = show;
        }

        // ===== CHAMADAS ÀS APIs ONLINE =====

        async function fetchQuran(surah, ayah) {
            try {
                const response = await fetch(`https://api.quran.com/api/v4/quran/verses/uthmani?verse_key=${surah}:${ayah}`);
                const data = await response.json();
                const arabic = data.verses[0]?.text_uthmani || '';
                
                // Tenta pegar tradução em português ou inglês
                let translation = '';
                try {
                    const transResponse = await fetch(`https://api.quran.com/api/v4/quran/translations/92?verse_key=${surah}:${ayah}`);
                    const transData = await transResponse.json();
                    translation = transData.translations[0]?.text || '';
                } catch(e) {
                    // fallback para inglês
                    const transResponse = await fetch(`https://api.quran.com/api/v4/quran/translations/131?verse_key=${surah}:${ayah}`);
                    const transData = await transResponse.json();
                    translation = transData.translations[0]?.text || '';
                }
                
                // Remove tags HTML
                translation = translation.replace(/<[^>]*>/g, '');
                
                return {
                    arabic,
                    translation: translation || 'Tradução não disponível'
                };
            } catch(e) {
                return null;
            }
        }

        async function fetchPrayerTimes(city = 'Sao Paulo') {
            try {
                // Usa Aladhan API
                const date = new Date();
                const dateStr = `${date.getDate()}-${date.getMonth()+1}-${date.getFullYear()}`;
                
                // Coordenadas aproximadas de São Paulo como padrão
                // Para cidade genérica, precisaríamos de geocoding
                const response = await fetch(`https://api.aladhan.com/v1/timingsByCity?city=${encodeURIComponent(city)}&country=Brazil&method=2`);
                const data = await response.json();
                
                if (data.code !== 200) throw new Error('API Error');
                
                const t = data.data.timings;
                return {
                    fajr: t.Fajr,
                    dhuhr: t.Dhuhr,
                    asr: t.Asr,
                    maghrib: t.Maghrib,
                    isha: t.Isha,
                    city: city
                };
            } catch(e) {
                return null;
            }
        }

        // ===== PROCESSADOR DE COMANDOS =====

        async function processCommand(text) {
            const cmd = text.toLowerCase().trim();
            
            // Alcorão
            if (cmd.startsWith('/quran')) {
                const parts = cmd.split(' ');
                if (parts.length < 2) {
                    return `📖 <strong>ALCORÃO</strong><br><br>
                    Use: <code>/quran [surata:versículo]</code><br>
                    Exemplos:<br>
                    • <code>/quran 2:255</code> — Ayat al-Kursi<br>
                    • <code>/quran 1:1</code> — Al-Fatiha<br>
                    • <code>/quran 112:1</code> — Al-Ikhlas`;
                }
                
                const ref = parts[1];
                const [surah, ayah] = ref.split(':').map(Number);
                
                if (!surah || !ayah) {
                    return '❌ Formato inválido. Use: <code>/quran 2:255</code>';
                }
                
                showLoading(true);
                const result = await fetchQuran(surah, ayah);
                showLoading(false);
                
                if (!result) {
                    return '⚠️ Erro ao buscar versículo. Verifique sua conexão.';
                }
                
                return `📖 <strong>Alcorão ${surah}:${ayah}</strong><br><br>
                <div class="verse-arabic">${result.arabic}</div>
                <strong>🇧🇷 Tradução:</strong><br>
                ${result.translation}<br><br>
                <em>🌐 Fonte: quran.com</em>`;
            }
            
            // Horários de oração
            if (cmd.startsWith('/salat')) {
                const parts = cmd.split(' ');
                const city = parts.length > 1 ? parts.slice(1).join(' ') : 'Sao Paulo';
                
                showLoading(true);
                const times = await fetchPrayerTimes(city);
                showLoading(false);
                
                if (!times) {
                    return '⚠️ Erro ao buscar horários. Tente novamente.<br><br>Horários padrão de São Paulo:<br>🌅 Fajr: 05:30<br>☀️ Dhuhr: 12:15<br>🌤️ Asr: 15:30<br>🌇 Maghrib: 17:45<br>🌙 Isha: 19:00';
                }
                
                return `🕌 <strong>HORÁRIOS DE ORAÇÃO</strong><br>
                📍 ${times.city}<br><br>
                <div class="prayer-time">
                    <div class="prayer-item"><div class="prayer-name">🌅 Fajr</div><div class="prayer-hour">${times.fajr}</div></div>
                    <div class="prayer-item"><div class="prayer-name">☀️ Dhuhr</div><div class="prayer-hour">${times.dhuhr}</div></div>
                    <div class="prayer-item"><div class="prayer-name">🌤️ Asr</div><div class="prayer-hour">${times.asr}</div></div>
                    <div class="prayer-item"><div class="prayer-name">🌇 Maghrib</div><div class="prayer-hour">${times.maghrib}</div></div>
                    <div class="prayer-item"><div class="prayer-name">🌙 Isha</div><div class="prayer-hour">${times.isha}</div></div>
                </div>
                <em>🌐 Fonte: aladhan.com</em>`;
            }
            
            // Hadith
            if (cmd === '/hadith') {
                const h = HADITHS[Math.floor(Math.random() * HADITHS.length)];
                return h.text;
            }
            
            // Duã
            if (cmd === '/dua') {
                const d = DUAS[Math.floor(Math.random() * DUAS.length)];
                return `🤲 <strong>${d.nome.toUpperCase()}</strong><br><br>
                <div class="verse-arabic">${d.arabe}</div>
                <em>${d.transliteracao}</em><br><br>
                🇧🇷 ${d.portugues}`;
            }
            
            // Wudhu
            if (cmd === '/wudhu') {
                return WUDHU_STEPS;
            }
            
            // Como orar
            if (cmd === '/salat_como' || cmd === '/como_orar') {
                return SALAT_STEPS;
            }
            
            // Ajuda
            if (cmd === '/ajuda' || cmd === '/help') {
                return `📋 <strong>COMANDOS DISPONÍVEIS</strong><br><br>
                📖 <code>/quran [ref]</code> — Alcorão (ex: 2:255)<br>
                🕌 <code>/salat [cidade]</code> — Horários de oração<br>
                📜 <code>/hadith</code> — Hadith aleatório<br>
                🤲 <code>/dua</code> — Súplica com árabe<br>
                💧 <code>/wudhu</code> — Como fazer ablução<br>
                🙏 <code>/salat_como</code> — Como orar<br><br>
                💬 <strong>Perguntas que entendo:</strong><br>
                • "O que é o Islam?"<br>
                • "Quem é o profeta?"<br>
                • "Os muçulmanos creem em Jesus?"<br>
                • "O Islam manda matar?"<br>
                • "Os 5 pilares"`;
            }
            
            // FAQ por palavras-chave
            const lower = cmd.toLowerCase();
            for (const [key, value] of Object.entries(FAQ)) {
                if (lower.includes(key)) {
                    return value.text;
                }
            }
            
            // Resposta padrão
            return `🤔 Não entendi bem. Tente:<br><br>
            • <code>/ajuda</code> para ver comandos<br>
            • Perguntar "O que é o Islam?"<br>
            • Perguntar "Quem é o profeta?"<br>
            • <code>/quran 2:255</code> para ler o Alcorão`;
        }

        // ===== FUNÇÕES DE INTERFACE =====

        async function sendMessage() {
            const text = userInput.value.trim();
            if (!text) return;
            
            addMessage(text, false);
            userInput.value = '';
            
            const response = await processCommand(text);
            addMessage(response, true);
        }

        async function sendQuick(text) {
            userInput.value = text;
            await sendMessage();
        }

        // Foco inicial
        userInput.focus();
    </script>
</body>
</html>
