<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Islam M Bot - Guia Islamico</title>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0d3b2e 0%, #1a5c47 50%, #0d3b2e 100%);
            min-height: 100vh;
            color: #fff;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 15px;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .header {
            text-align: center;
            padding: 20px 0;
            border-bottom: 2px solid rgba(212,175,55,0.5);
        }

        .chat-area {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .message {
            max-width: 85%;
            padding: 12px 16px;
            border-radius: 18px;
        }

        .bot-msg {
            align-self: flex-start;
            background: rgba(255,255,255,0.12);
        }

        .user-msg {
            align-self: flex-end;
            background: #d4af37;
            color: #0d3b2e;
        }

        .input-area {
            display: flex;
            gap: 10px;
            padding: 15px 0;
        }

        .input-area input {
            flex: 1;
            padding: 14px;
            border-radius: 25px;
            border: 2px solid rgba(212,175,55,0.4);
            background: rgba(255,255,255,0.1);
            color: #fff;
            outline: none;
        }

        .send-btn {
            width: 50px;
            border-radius: 50%;
            border: none;
            background: #d4af37;
            cursor: pointer;
        }

        .quick-buttons {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: center;
            padding: 10px 0;
        }

        .quick-btn {
            background: rgba(212,175,55,0.15);
            border: 1px solid rgba(212,175,55,0.3);
            color: #d4af37;
            padding: 8px 12px;
            border-radius: 20px;
            cursor: pointer;
        }
    </style>
</head>

<body>

<div class="container">

    <div class="header">
        <h1>🕌 Islam M Bot</h1>
    </div>

    <div class="quick-buttons" id="quickButtons">
        <button class="quick-btn" data-action="salat">🕐 Salat</button>
        <button class="quick-btn" data-action="quran1">📖 1:1</button>
        <button class="quick-btn" data-action="islam">☪️ Islam</button>
        <button class="quick-btn" data-action="wudu">💧 Wudu</button>
    </div>

    <div class="chat-area" id="chatArea">
        <div class="message bot-msg">As-salamu alaykum 🌙</div>
    </div>

    <div class="input-area">
        <input type="text" id="userInput" placeholder="Digite sua pergunta...">
        <button class="send-btn" id="sendBtn">➤</button>
    </div>

</div>

<script>
document.addEventListener("DOMContentLoaded", function () {

    var REPO_BASE = "https://raw.githubusercontent.com/islammocambique-maker/Bot-IslamM/main";

    var ARQUIVOS_CEREBRO = {
        pratica: ["salat", "Wudhu"],
        definicao: ["Janazah","adoracao_ibadah","comportamento","crenca_aquidah","crianca_educacao_bobecas","familia_direitos","fiqh","mulheres_do_profeta","palavras","perguntas_frequentes","ramadan"],
        mais: ["mais_conhecimento"],
        extra: ["extra_bot"]
    };

    var cerebroPratica = [];
    var cerebroDefinicao = [];
    var cerebroMais = [];
    var cerebroExtra = [];

    const chatArea = document.getElementById("chatArea");
    const userInput = document.getElementById("userInput");
    const sendBtn = document.getElementById("sendBtn");
    const quickButtons = document.getElementById("quickButtons");

    function addMessage(text, isUser) {
        var div = document.createElement("div");
        div.className = "message " + (isUser ? "user-msg" : "bot-msg");
        div.innerHTML = text;
        chatArea.appendChild(div);
        chatArea.scrollTop = chatArea.scrollHeight;
    }

    function normalize(t){
        return (t||"").toLowerCase().normalize('NFD')
        .replace(/[\u0300-\u036f]/g,'')
        .replace(/[^a-z0-9\s]/g,' ')
        .replace(/\s+/g,' ')
        .trim();
    }

    function buscarResposta(texto){
        var q = normalize(texto);
        var all = cerebroPratica.concat(cerebroDefinicao,cerebroMais,cerebroExtra);

        for(var i=0;i<all.length;i++){
            var e = all[i];
            var keys = e.palavras_chave || [];
            for(var j=0;j<keys.length;j++){
                if(q.indexOf(normalize(keys[j]))>=0){
                    return e;
                }
            }
        }
        return null;
    }

    async function carregarArquivo(pasta,arquivo){
        try{
            var r = await fetch(REPO_BASE+"/cerebro/"+pasta+"/"+arquivo);
            if(!r.ok) return null;
            return await r.json();
        }catch(e){ return null; }
    }

    async function carregarCerebro(){
        for(var p in ARQUIVOS_CEREBRO){
            var lista=[];
            for(var a of ARQUIVOS_CEREBRO[p]){
                var d = await carregarArquivo(p,a);
                if(d) lista = lista.concat(d);
            }
            if(p==="pratica") cerebroPratica=lista;
            if(p==="definicao") cerebroDefinicao=lista;
            if(p==="mais") cerebroMais=lista;
            if(p==="extra") cerebroExtra=lista;
        }

        addMessage("✅ Cérebro carregado", false);
    }

    function sendMessage(){
        var t = userInput.value.trim();
        if(!t) return;

        addMessage(t,true);
        userInput.value="";

        var r = buscarResposta(t);

        if(r){
            addMessage(
                "<b>"+(r.resposta||"Sem resposta")+"</b><br><br>📚 "+(r.fonte||""),
                false
            );
        } else {
            addMessage("🤔 Não encontrei resposta", false);
        }
    }

    // ✅ BOTÃO FUNCIONA
    sendBtn.addEventListener("click", sendMessage);

    userInput.addEventListener("keydown", function(e){
        if(e.key==="Enter") sendMessage();
    });

    quickButtons.addEventListener("click", function(e){
        var btn = e.target.closest(".quick-btn");
        if(!btn) return;

        var map={
            salat:"horario salat",
            quran1:"Alcorão 1:1",
            islam:"o que é islam",
            wudu:"como fazer wudu"
        };

        userInput.value = map[btn.dataset.action] || "";
        sendMessage();
    });

    carregarCerebro();

});
</script>

</body>
</html>
