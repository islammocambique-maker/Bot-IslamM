        :root {
            --primary: #1a5f4a;

            --text-secondary: #666;

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {

            background: var(--bg);
            min-height: 100vh;
            color: var(--text);
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .header {
            text-align: center;
            padding: 30px 20px;
            background: linear-gradient(135deg, var(--primary-dark) 0%, var(--primary) 100%);
            border-radius: 20px;
            margin-bottom: 20px;
            color: white;
            position: relative;
            overflow: hidden;
        }

        .header::before {
            content: '☪';
            position: absolute;
            font-size: 150px;
            opacity: 0.05;
            top: -30px;
            right: -20px;
        }

        .header h1 {
            font-size: 2rem;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .header p {
            opacity: 0.9;
            font-size: 0.95rem;
        }

        .chat-container {
            flex: 1;
            background: var(--card);
            border-radius: 20px;
            box-shadow: var(--shadow);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            margin-bottom: 20px;
        }

        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            max-height: 60vh;
        }

        .message {
            max-width: 85%;
            padding: 14px 18px;
            border-radius: 18px;
            line-height: 1.6;
            animation: fadeIn 0.3s ease;
            word-wrap: break-word;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.user {
            align-self: flex-end;
            background: var(--primary);
            color: white;
            border-bottom-right-radius: 4px;
        }

        .message.bot {
            align-self: flex-start;
            background: #f5f7f6;
            color: var(--text);
            border-bottom-left-radius: 4px;
            border: 1px solid var(--border);
        }

        .message.bot .greeting {
            color: var(--primary);
            font-weight: 600;
            margin-bottom: 8px;
            display: block;
        }

        .message.bot .keyword {
            color: var(--gold);
            font-weight: 600;
        }

        .message.bot strong, .message.bot b {
            font-weight: 600;
            color: var(--primary-dark);
        }

        .quran-result {
            background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
            border-radius: 12px;
            padding: 16px;
            margin-top: 12px;
            border-right: 4px solid var(--gold);

            font-family: 'Amiri', serif;
            font-size: 1.6rem;
            text-align: right;
            direction: rtl;
            color: var(--primary-dark);
            line-height: 2;
            margin-bottom: 12px;
        }

            font-size: 0.95rem;
            color: var(--text-secondary);
            line-height: 1.8;
            padding-top: 12px;
            border-top: 1px solid var(--border);
        }

            display: inline-block;
            background: var(--primary);
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            margin-bottom: 10px;

            color: white;

        }

        .quick-actions {
            display: flex;

            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }

            display: flex;
            align-items: center;

// ==================== CARREGAR CÉREBRO ====================
async function carregarCerebro() {
    cerebro = [...CONFIG.CEREBRO_FALLBACK];
    
    for (const item of CONFIG.CEREBRO_FICHEIROS) {
        try {
            const url = `${item.pasta}${item.ficheiro}`;
            const response = await fetch(url);
            
            if (response.ok) {
                const texto = await response.text();
                const dados = parseCerebroTexto(texto, item.ficheiro);
                
                if (dados && dados.length > 0) {
                    cerebro = [...cerebro, ...dados];
                    console.log(`✅ Carregado: ${url} (${dados.length} entradas)`);
                }
            } else {
                console.log(`❌ Não encontrado: ${url}`);
            }
        } catch (e) {
            console.log(`❌ Erro ao carregar ${item.pasta}${item.ficheiro}:`, e.message);
        }
    }
    
    console.log(`🧠 Cérebro total: ${cerebro.length} entradas`);
}

// ==================== PARSE DO FORMATO DO CÉREBRO ====================
function parseCerebroTexto(texto, nomeFicheiro) {
    const entradas = [];
    
    try {
        // Tenta primeiro como JSON
        try {
            const json = JSON.parse(texto);
            if (Array.isArray(json)) {
                // Normaliza palavras-chave para minúsculas
                return json.map(entry => ({
                    ...entry,
                    palavras_chave: (entry.palavras_chave || []).map(k => String(k).toLowerCase().trim())
                }));
            }
            if (json.palavras_chave) {
                json.palavras_chave = (json.palavras_chave || []).map(k => String(k).toLowerCase().trim());
                return [json];
            }
            if (json.data && Array.isArray(json.data)) {
                return json.data.map(entry => ({
                    ...entry,
                    palavras_chave: (entry.palavras_chave || []).map(k => String(k).toLowerCase().trim())
                }));
            }
        } catch (e) {
            // Não é JSON, continua com parse manual
        }
        
        // Parse de formato grid/texto
        const blocos = texto.split(/\n---+\n|\n\n\n+/);
        
        for (const bloco of blocos) {
            if (!bloco.trim()) continue;
            
            const linhas = bloco.trim().split('\n');
            const entry = {
                palavras_chave: [],
                resposta: '',
                fonte: nomeFicheiro,
                categoria: detectarCategoria(nomeFicheiro),
                nivel: 'basico',
                links: []
            };
            
            let modo = 'keywords';
            
            for (const linha of linhas) {
                const trimmed = linha.trim();
                if (!trimmed) continue;
                
                if (trimmed.toLowerCase().startsWith('palavras_chave:') || modo === 'keywords') {
                    const textoKw = trimmed.replace(/palavras_chave:\s*/i, '');
                    entry.palavras_chave = textoKw.split(/[,;|]/).map(k => k.trim().toLowerCase()).filter(k => k);
                    modo = 'resposta';
                }
                else if (trimmed.toLowerCase().startsWith('resposta:')) {
                    entry.resposta = trimmed.replace(/resposta:\s*/i, '');
                    modo = 'resposta';
                }
                else if (trimmed.toLowerCase().startsWith('fonte:')) {
                    entry.fonte = trimmed.replace(/fonte:\s*/i, '');
                }
                else if (trimmed.toLowerCase().startsWith('categoria:')) {
                    entry.categoria = trimmed.replace(/categoria:\s*/i, '');
                }
                else if (modo === 'resposta') {
                    entry.resposta += (entry.resposta ? '\n' : '') + trimmed;
                }
            }
            
            if (entry.palavras_chave.length > 0 && entry.resposta) {
                entradas.push(entry);
            }
        }
        
        // Se não conseguiu parsear em blocos, tenta linha a linha
        if (entradas.length === 0) {
            const linhas = texto.split('\n').filter(l => l.trim());
            for (const linha of linhas) {
                const match = linha.match(/^([^:]+):\s*(.+)$/);
                if (match) {
                    entradas.push({
                        palavras_chave: match[1].split(/[,;]/).map(k => k.trim().toLowerCase()),
                        resposta: match[2].trim(),
                        fonte: nomeFicheiro,
                        categoria: detectarCategoria(nomeFicheiro),
                        nivel: 'basico',
                        links: []
                    });
                }
            }
        }
        
    } catch (e) {
        console.error(`Erro ao parsear ${nomeFicheiro}:`, e);
    }
    
    return entradas;
}

function detectarCategoria(nomeFicheiro) {
    const lower = nomeFicheiro.toLowerCase();
    if (lower.includes('pratica') || lower.includes('salat') || lower.includes('wudhu') || lower.includes('wudu')) return 'pratica';
    if (lower.includes('definicao') || lower.includes('crenca') || lower.includes('fiqh') || lower.includes('aqidah')) return 'definicao';
    if (lower.includes('extra')) return 'extra';
    return 'mais';
}

// ==================== ENVIO DE MENSAGEM ====================
function sendMessage() {
    const input = document.getElementById('userInput');
    const texto = input.value.trim();
    
    if (!texto) return;
    
    adicionarMensagemUsuario(texto);
    input.value = '';
    
    mostrarDigitando();
    
    setTimeout(() => {
        processarPergunta(texto);
    }, 800);
}

// ==================== PROCESSAMENTO ====================
async function processarPergunta(texto) {
    esconderDigitando();
    
    // NORMALIZA PARA MINÚSCULAS — tudo o que o utilizador escreve vira minúsculo
    const lower = texto.toLowerCase().trim();
    
    const quranMatch = detectarVersiculo(texto);
    if (quranMatch) {
        await buscarVersiculoAPI(quranMatch.surah, quranMatch.ayah);
        return;
    }
    
    if (lower.includes('suporte') || lower.includes('ajuda') || lower.includes('contacto') || lower.includes('contato')) {
        responderSuporte();
        return;
    }
    
    if (lower.includes('wudu') || lower.includes('ablucao') || lower.includes('ablution') || lower.includes('wudhu')) {
        const entry = encontrarNoCerebro(['wudu', 'ablucao', 'ablution', 'wudhu']);
        if (entry) {
            responderComFormato(entry, 'wudu');
        }
        return;
    }
    
    // Palavras do utilizador já em minúsculas
    const palavras = lower.split(/\s+/).filter(p => p.length > 2);
    const entry = encontrarNoCerebro(palavras);
    
    if (entry) {
        responderComFormato(entry, entry.palavras_chave[0]);
    } else {
        responderNaoEncontrado(texto);
    }
}

// ==================== DETECTAR VERSÍCULO ====================
function detectarVersiculo(texto) {
    const padroes = [
        /(\d+)[:\/](\d+)/,
        /surah?\s+(\d+).*?ayah?\s+(\d+)/i,
        /capitulo?\s+(\d+).*?versiculo?\s+(\d+)/i,
        /(\d+)\s+(\d+)/
    ];
    
    for (const padrao of padroes) {
        const match = texto.match(padrao);
        if (match) {
            const surah = parseInt(match[1]);
            const ayah = parseInt(match[2]);
            if (surah >= 1 && surah <= 114 && ayah >= 1) {
                return { surah, ayah };
            }
        }
    }
    
    return null;
}

// ==================== BUSCAR VERSÍCULO - API CORRIGIDA ====================
async function buscarVersiculoAPI(surah, ayah) {
    let arabicText = '';
    let translation = '';
    
    // TENTATIVA 1: API QuranEnc (português Helmi Nasr)
    try {
        const response = await fetch(`https://quranenc.com/api/v1/translation/aya/portuguese_nasr/${surah}/${ayah}`);
        if (response.ok) {
            const data = await response.json();
            if (data && data.result) {
                arabicText = data.result.arabic_text || '';
                translation = data.result.translation || '';
            }
        }
    } catch (e) {
        console.log('QuranEnc falhou, tentando alternativa...');
    }
    
    // TENTATIVA 2: API Al-Quran Cloud
    if (!translation) {
        try {
            const response = await fetch(`https://api.alquran.cloud/v1/ayah/${surah}:${ayah}/editions/quran-uthmani,pt.hamidullah`);
            if (response.ok) {
                const data = await response.json();
                if (data.data && data.data.length >= 2) {
                    arabicText = data.data[0].text || '';
                    translation = data.data[1].text || '';
                }
            }
        } catch (e) {
            console.log('Al-Quran Cloud falhou...');
        }
    }
    
    // TENTATIVA 3: API Quran.com v4
    if (!translation) {
        try {
            const response = await fetch(`https://api.quran.com/api/v4/verses/by_key/${surah}:${ayah}?translations=92&fields=text_uthmani`);
            if (response.ok) {
                const data = await response.json();
                const verse = data.verse;
                if (verse) {
                    arabicText = verse.text_uthmani || '';
                    if (verse.translations && verse.translations.length > 0) {
                        translation = verse.translations[0].text || '';
                    }
                }
            }
        } catch (e) {
            console.log('Quran.com v4 falhou...');
        }
    }
    
    if (!translation && !arabicText) {
        adicionarMensagemBotHTML(`
            <span class="greeting">⚠️ Erro de conexão</span>
            <div style="margin-top: 8px; line-height: 1.8;">
                Não foi possível carregar o versículo <strong>${surah}:${ayah}</strong> agora. As APIs podem estar temporariamente indisponíveis.<br><br>
                Você pode consultar diretamente em:<br>
                <a href="https://quran.com/pt/${surah}/${ayah}" target="_blank" style="color: var(--primary);">🔗 quran.com/pt/${surah}/${ayah}</a><br><br>
                Ou tente novamente em alguns instantes.
            </div>
        `);
        return;
    }
    
    if (!translation) {
        translation = 'Tradução em português temporariamente indisponível. Consulte quran.com/pt/' + surah + '/' + ayah;
    }
    
    if (!arabicText) {
        arabicText = '〔Texto em árabe não disponível〕';
    }
    
    salvarNoHistorico();
    
    respostaAtual = {
        tipo: 'quran',
        surah: surah,
        ayah: ayah,
        arabic: arabicText,
        translation: translation
    };
    
    const html = `
        <span class="greeting">ótima pergunta! Aqui vai uma resposta sobre <span class="keyword">Alcorão ${surah}:${ayah}</span></span>
        <div class="quran-result">
            <span class="quran-ref">📖 Surah ${surah} : ${ayah}</span>
            <div class="quran-arabic">${arabicText}</div>
            <div class="quran-translation"><strong>Significado em Português:</strong><br>${translation}</div>
        </div>
        ${renderizarHistorico()}
    `;
    
    adicionarMensagemBotHTML(html);
}

// ==================== RESPONDER COM FORMATO ====================

    salvarNoHistorico();
    
    respostaAtual = {
        tipo: 'cerebro',
        keyword: keyword,
        resposta: entry.resposta,
        fonte: entry.fonte
    };
    
    const respostaFormatada = entry.resposta.replace(/\n/g, '<br>');
    
    const html = `

        ${renderizarHistorico()}

}

// ==================== HISTÓRICO ====================
function salvarNoHistorico() {
    if (respostaAtual) {
        historicoRespostas.unshift({
            ...respostaAtual,
            timestamp: new Date().toLocaleString('pt-MZ')
        });
        if (historicoRespostas.length > 10) historicoRespostas.pop();
    }
}

function renderizarHistorico() {
    if (historicoRespostas.length === 0) return '';
    
    let html = '<div class="previous-answers">';
    html += `<button class="prev-btn" onclick="toggleHistorico(this)">📜 Ver respostas anteriores (${historicoRespostas.length})</button>`;
    html += '<div class="prev-list">';
    
    historicoRespostas.forEach((item) => {
        html += `<div class="prev-item">`;
        if (item.tipo === 'quran') {
            html += `<strong>Alcorão ${item.surah}:${item.ayah}</strong>`;
        } else {
            html += `<strong>${item.keyword}</strong>`;
        }
        html += `<small>${item.timestamp}</small>`;
        html += `</div>`;
    });
    
    html += '</div></div>';
    return html;
}

function toggleHistorico(btn) {
    const list = btn.nextElementSibling;
    list.classList.toggle('show');
    btn.textContent = list.classList.contains('show') 
        ? '🔼 Ocultar respostas anteriores' 
        : `📜 Ver respostas anteriores (${historicoRespostas.length})`;
}

// ==================== BUSCAR NO CÉREBRO — TUDO EM MINÚSCULAS ====================
function encontrarNoCerebro(palavras) {
    let melhorMatch = null;
    let melhorScore = 0;
    
    for (const entry of cerebro) {
        let score = 0;
        // Palavras-chave já estão em minúsculas (normalizadas no parse)
        const keywords = entry.palavras_chave || [];
        
        // Palavras do utilizador já vêm em minúsculas
        for (const palavra of palavras) {
            for (const kw of keywords) {
                // Comparação tudo em minúsculas
                if (kw === palavra) score += 3;
                else if (kw.includes(palavra)) score += 2;
                else if (palavra.includes(kw)) score += 1;
            }
        }
        
        if (score > melhorScore) {
            melhorScore = score;
            melhorMatch = entry;
        }
    }
    
    return melhorScore >= 2 ? melhorMatch : null;
}

// ==================== UI HELPERS ====================
function adicionarMensagemUsuario(texto) {
    const div = document.createElement('div');
    div.className = 'message user';
    div.textContent = texto;
    document.getElementById('messages').appendChild(div);
    scrollToBottom();
}

function adicionarMensagemBotHTML(html) {
    const div = document.createElement('div');
    div.className = 'message bot';
    div.innerHTML = html;
    document.getElementById('messages').appendChild(div);
    scrollToBottom();
}

function mostrarDigitando() {
    const div = document.createElement('div');
    div.className = 'message bot typing';
    div.id = 'typingIndicator';
    div.innerHTML = '<span></span><span></span><span></span>';
    document.getElementById('messages').appendChild(div);
    scrollToBottom();
}

function esconderDigitando() {
    const el = document.getElementById('typingIndicator');
    if (el) el.remove();
}

function scrollToBottom() {
    const messages = document.getElementById('messages');
    messages.scrollTop = messages.scrollHeight;
}

window.toggleHistorico = toggleHistorico;
