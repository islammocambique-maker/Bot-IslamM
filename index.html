<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Islam M - Assistente Islâmico</title>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #1a5f4a;
            --primary-light: #2d8a6e;
            --primary-dark: #0d3d2e;
            --gold: #c9a227;
            --bg: #f0f4f1;
            --card: #ffffff;
            --text: #1a1a1a;
            --text-secondary: #666;
            --border: #d4ddd8;
            --shadow: 0 4px 20px rgba(0,0,0,0.08);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            min-height: 100vh;
            color: var(--text);
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 10px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .header {
            text-align: center;
            padding: 15px 20px;
            background: linear-gradient(135deg, var(--primary-dark) 0%, var(--primary) 100%);
            border-radius: 16px;
            margin-bottom: 10px;
            color: white;
            position: relative;
            overflow: hidden;
        }

        .header::before {
            content: '☪';
            position: absolute;
            font-size: 100px;
            opacity: 0.05;
            top: -20px;
            right: -10px;
        }

        .header h1 {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .header p {
            opacity: 0.9;
            font-size: 0.85rem;
        }

        .chat-container {
            flex: 1;
            background: var(--card);
            border-radius: 16px;
            box-shadow: var(--shadow);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            margin-bottom: 10px;
        }

        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            max-height: 65vh;
        }

        .message {
            max-width: 90%;
            padding: 12px 16px;
            border-radius: 16px;
            line-height: 1.6;
            animation: fadeIn 0.3s ease;
            word-wrap: break-word;
            font-size: 0.95rem;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.user {
            align-self: flex-end;
            background: var(--primary);
            color: white;
            border-bottom-right-radius: 4px;
        }

        .message.bot {
            align-self: flex-start;
            background: #f5f7f6;
            color: var(--text);
            border-bottom-left-radius: 4px;
            border: 1px solid var(--border);
        }

        .message.bot .greeting {
            color: var(--primary);
            font-weight: 600;
            margin-bottom: 6px;
            display: block;
        }

        .message.bot .keyword {
            color: var(--gold);
            font-weight: 600;
        }

        .message.bot strong, .message.bot b {
            font-weight: 600;
            color: var(--primary-dark);
        }

        .quran-result {
            background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
            border-radius: 10px;
            padding: 12px;
            margin-top: 10px;
            border-right: 3px solid var(--gold);
        }

        .quran-arabic {
            font-family: 'Amiri', serif;
            font-size: 1.4rem;
            text-align: right;
            direction: rtl;
            color: var(--primary-dark);
            line-height: 1.8;
            margin-bottom: 10px;
        }

        .quran-translation {
            font-size: 0.9rem;
            color: var(--text-secondary);
            line-height: 1.7;
            padding-top: 10px;
            border-top: 1px solid var(--border);
        }

        .quran-ref {
            display: inline-block;
            background: var(--primary);
            color: white;
            padding: 3px 10px;
            border-radius: 15px;
            font-size: 0.75rem;
            margin-bottom: 8px;
        }

        .previous-answers {
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px dashed var(--border);
        }

        .prev-btn {
            background: transparent;
            border: 1px solid var(--primary-light);
            color: var(--primary);
            padding: 5px 12px;
            border-radius: 15px;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .prev-btn:hover {
            background: var(--primary);
            color: white;
        }

        .prev-list {
            display: none;
            margin-top: 8px;
            padding: 8px;
            background: white;
            border-radius: 8px;
            border: 1px solid var(--border);
        }

        .prev-list.show { display: block; }

        .prev-item {
            padding: 6px;
            margin-bottom: 4px;
            background: #f8f9fa;
            border-radius: 6px;
            font-size: 0.85rem;
        }

        .prev-item small {
            color: var(--text-secondary);
            display: block;
            margin-top: 2px;
            font-size: 0.75rem;
        }

        .quick-actions {
            display: flex;
            gap: 8px;
            padding: 10px 15px;
            flex-wrap: wrap;
            background: white;
            border-top: 1px solid var(--border);
        }

        .quick-btn {
            padding: 6px 14px;
            border: 1px solid var(--border);
            background: #f8f9fa;
            border-radius: 18px;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s;
            color: var(--text);
            white-space: nowrap;
        }

        .quick-btn:hover {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        .input-area {
            padding: 12px 15px;
            background: white;
            border-top: 1px solid var(--border);
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .input-wrapper {
            flex: 1;
            position: relative;
        }

        #userInput {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid var(--border);
            border-radius: 22px;
            font-size: 0.95rem;
            outline: none;
            transition: border-color 0.2s;
            font-family: 'Inter', sans-serif;
        }

        #userInput:focus {
            border-color: var(--primary-light);
        }

        #sendBtn {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            border: none;
            background: var(--primary);
            color: white;
            font-size: 1.2rem;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        #sendBtn:hover {
            background: var(--primary-dark);
            transform: scale(1.05);
        }

        .typing {
            display: flex;
            gap: 4px;
            padding: 10px 16px;
        }

        .typing span {
            width: 7px;
            height: 7px;
            background: var(--primary-light);
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out;
        }

        .typing span:nth-child(1) { animation-delay: 0s; }
        .typing span:nth-child(2) { animation-delay: 0.2s; }
        .typing span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }

        .messages::-webkit-scrollbar-track { background: transparent; }
        .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

        @media (max-width: 600px) {
            .container { padding: 8px; }
            .header { padding: 12px 15px; border-radius: 12px; }
            .header h1 { font-size: 1.3rem; }
            .message { max-width: 92%; padding: 10px 14px; font-size: 0.9rem; }
            .messages { padding: 10px; max-height: 60vh; }
            .quick-actions { gap: 6px; padding: 8px 10px; }
            .quick-btn { padding: 5px 12px; font-size: 0.8rem; }
        }
    </style>

// ==================== CARREGAR CÉREBRO ====================
async function carregarCerebro() {
    cerebro = [...CONFIG.CEREBRO_FALLBACK];
    
    for (const item of CONFIG.CEREBRO_FICHEIROS) {
        try {
            const url = `${item.pasta}${item.ficheiro}`;
            const response = await fetch(url);
            
            if (response.ok) {
                const texto = await response.text();
                const dados = parseCerebroTexto(texto, item.ficheiro);
                
                if (dados && dados.length > 0) {
                    cerebro = [...cerebro, ...dados];
                    console.log(`✅ Carregado: ${url} (${dados.length} entradas)`);
                }
            } else {
                console.log(`❌ Não encontrado: ${url} (status: ${response.status})`);
            }
        } catch (e) {
            console.log(`❌ Erro ao carregar ${item.pasta}${item.ficheiro}:`, e.message);
        }
    }
    
    console.log(`🧠 Cérebro total: ${cerebro.length} entradas`);
    
    // DEBUG: mostra todas as palavras-chave carregadas
    console.log('📋 Todas as keywords carregadas:');
    cerebro.forEach((entry, i) => {
        console.log(`  [${i}] ${entry.palavras_chave?.join(', ') || 'SEM KEYWORDS'} | resposta: ${entry.resposta ? 'SIM' : 'NÃO'}`);
    });
}

// ==================== PARSE DO FORMATO DO CÉREBRO ====================
function parseCerebroTexto(texto, nomeFicheiro) {
    const entradas = [];
    
    try {
        // Tenta primeiro como JSON
        try {
            const json = JSON.parse(texto);
            if (Array.isArray(json)) {
                const parsed = json.map(entry => normalizarEntrada(entry, nomeFicheiro)).filter(e => e);
                console.log(`📄 JSON array: ${parsed.length} entradas válidas de ${json.length}`);
                return parsed;
            }
            if (json.palavras_chave || json.resposta) {
                const parsed = normalizarEntrada(json, nomeFicheiro);
                return parsed ? [parsed] : [];
            }
            if (json.data && Array.isArray(json.data)) {
                const parsed = json.data.map(entry => normalizarEntrada(entry, nomeFicheiro)).filter(e => e);
                return parsed;
            }
        } catch (e) {
            // Não é JSON, continua com parse manual
        }
        
        // Parse de formato grid/texto
        const blocos = texto.split(/\n---+\n|\n\n\n+/);
        
        for (const bloco of blocos) {
            if (!bloco.trim()) continue;
            
            const linhas = bloco.trim().split('\n');
            const entry = {
                palavras_chave: [],
                resposta: '',
                fonte: nomeFicheiro,
                categoria: detectarCategoria(nomeFicheiro),
                nivel: 'basico',
                links: []
            };
            
            let modo = 'keywords';
            
            for (const linha of linhas) {
                const trimmed = linha.trim();
                if (!trimmed) continue;
                
                if (trimmed.toLowerCase().startsWith('palavras_chave:') || modo === 'keywords') {
                    const textoKw = trimmed.replace(/palavras_chave:\s*/i, '');
                    entry.palavras_chave = textoKw.split(/[,;|]/).map(k => k.trim().toLowerCase()).filter(k => k);
                    modo = 'resposta';
                }
                else if (trimmed.toLowerCase().startsWith('resposta:')) {
                    entry.resposta = trimmed.replace(/resposta:\s*/i, '');
                    modo = 'resposta';
                }
                else if (trimmed.toLowerCase().startsWith('fonte:')) {
                    entry.fonte = trimmed.replace(/fonte:\s*/i, '');
                }
                else if (trimmed.toLowerCase().startsWith('categoria:')) {
                    entry.categoria = trimmed.replace(/categoria:\s*/i, '');
                }
                else if (modo === 'resposta') {
                    entry.resposta += (entry.resposta ? '\n' : '') + trimmed;
                }
            }
            
            if (entry.palavras_chave.length > 0 && entry.resposta) {
                entradas.push(entry);
            }
        }
        
        // Se não conseguiu parsear em blocos, tenta linha a linha
        if (entradas.length === 0) {
            const linhas = texto.split('\n').filter(l => l.trim());
            for (const linha of linhas) {
                const match = linha.match(/^([^:]+):\s*(.+)$/);
                if (match) {
                    entradas.push({
                        palavras_chave: match[1].split(/[,;]/).map(k => k.trim().toLowerCase()).filter(k => k),
                        resposta: match[2].trim(),
                        fonte: nomeFicheiro,
                        categoria: detectarCategoria(nomeFicheiro),
                        nivel: 'basico',
                        links: []
                    });
                }
            }
        }
        
    } catch (e) {
        console.error(`Erro ao parsear ${nomeFicheiro}:`, e);
    }
    
    return entradas;
}

// Normaliza uma entrada do JSON para garantir compatibilidade
function normalizarEntrada(entry, nomeFicheiro) {
    if (!entry) return null;
    
    // Pega palavras-chave (pode ser array ou string)
    let keywords = [];
    if (Array.isArray(entry.palavras_chave)) {
        keywords = entry.palavras_chave;
    } else if (typeof entry.palavras_chave === 'string') {
        keywords = entry.palavras_chave.split(/[,;|]/);
    }
    
    // Normaliza: minúsculas, sem acentos, trim, remove vazios
    keywords = keywords
        .map(k => String(k).toLowerCase().trim())
        .map(k => removerAcentos(k))
        .filter(k => k && k.length > 0);
    
    // Pega resposta (pode ser "resposta" ou "resposta")
    let resposta = entry.resposta || entry.resposta || '';
    
    // Se não tiver palavras-chave ou resposta, ignora
    if (keywords.length === 0 || !resposta) {
        console.log(`⚠️ Entrada ignorada em ${nomeFicheiro}: keywords=${keywords.length}, resposta=${resposta ? 'SIM' : 'NÃO'}`);
        return null;
    }
    
    return {
        palavras_chave: keywords,
        resposta: resposta,
        fonte: entry.fonte || nomeFicheiro,
        categoria: entry.categoria || detectarCategoria(nomeFicheiro),
        nivel: entry.nivel || 'basico',
        links: entry.links || []
    };
}

function detectarCategoria(nomeFicheiro) {
    const lower = nomeFicheiro.toLowerCase();
    if (lower.includes('pratica') || lower.includes('salat') || lower.includes('wudhu') || lower.includes('wudu')) return 'pratica';
    if (lower.includes('definicao') || lower.includes('crenca') || lower.includes('fiqh') || lower.includes('aqidah')) return 'definicao';
    if (lower.includes('extra')) return 'extra';
    return 'mais';
}

// ==================== ENVIO DE MENSAGEM ====================
function sendMessage() {
    const input = document.getElementById('userInput');
    const texto = input.value.trim();
    
    if (!texto) return;
    
    adicionarMensagemUsuario(texto);
    input.value = '';
    
    mostrarDigitando();
    
    setTimeout(() => {
        processarPergunta(texto);
    }, 800);
}

// ==================== PROCESSAMENTO ====================
async function processarPergunta(texto) {
    esconderDigitando();
    
    const lower = texto.toLowerCase().trim();
    
    const quranMatch = detectarVersiculo(texto);
    if (quranMatch) {
        await buscarVersiculoAPI(quranMatch.surah, quranMatch.ayah);
        return;
    }
    
    if (lower.includes('suporte') || lower.includes('ajuda') || lower.includes('contacto') || lower.includes('contato')) {
        responderSuporte();
        return;
    }
    
    const palavras = lower.split(/\s+/).filter(p => p.length > 2);
    const entry = encontrarNoCerebro(palavras);
    
    if (entry) {
        const keywordDisplay = entry.palavras_chave && entry.palavras_chave.length > 0 
            ? entry.palavras_chave[0] 
            : 'tema';
        responderComFormato(entry, keywordDisplay);
    } else {
        responderNaoEncontrado(texto);
    }
}

// ==================== DETECTAR VERSÍCULO ====================
function detectarVersiculo(texto) {
    const padroes = [
        /(\d+)[:\/](\d+)/,
        /surah?\s+(\d+).*?ayah?\s+(\d+)/i,
        /capitulo?\s+(\d+).*?versiculo?\s+(\d+)/i,
        /(\d+)\s+(\d+)/
    ];
    
    for (const padrao of padroes) {
        const match = texto.match(padrao);
        if (match) {
            const surah = parseInt(match[1]);
            const ayah = parseInt(match[2]);
            if (surah >= 1 && surah <= 114 && ayah >= 1) {
                return { surah, ayah };
            }
        }
    }
    
    return null;
}

// ==================== BUSCAR VERSÍCULO - API CORRIGIDA ====================
async function buscarVersiculoAPI(surah, ayah) {
    let arabicText = '';
    let translation = '';
    
    // TENTATIVA 1: API QuranEnc (português Helmi Nasr)
    try {
        const response = await fetch(`https://quranenc.com/api/v1/translation/aya/portuguese_nasr/${surah}/${ayah}`);
        if (response.ok) {
            const data = await response.json();
            if (data && data.result) {
                arabicText = data.result.arabic_text || '';
                translation = data.result.translation || '';
            }
        }
    } catch (e) {
        console.log('QuranEnc falhou, tentando alternativa...');
    }
    
    // TENTATIVA 2: API Al-Quran Cloud
    if (!translation) {
        try {
            const response = await fetch(`https://api.alquran.cloud/v1/ayah/${surah}:${ayah}/editions/quran-uthmani,pt.hamidullah`);
            if (response.ok) {
                const data = await response.json();
                if (data.data && data.data.length >= 2) {
                    arabicText = data.data[0].text || '';
                    translation = data.data[1].text || '';
                }
            }
        } catch (e) {
            console.log('Al-Quran Cloud falhou...');
        }
    }
    
    // TENTATIVA 3: API Quran.com v4
    if (!translation) {
        try {
            const response = await fetch(`https://api.quran.com/api/v4/verses/by_key/${surah}:${ayah}?translations=92&fields=text_uthmani`);
            if (response.ok) {
                const data = await response.json();
                const verse = data.verse;
                if (verse) {
                    arabicText = verse.text_uthmani || '';
                    if (verse.translations && verse.translations.length > 0) {
                        translation = verse.translations[0].text || '';
                    }
                }
            }
        } catch (e) {
            console.log('Quran.com v4 falhou...');
        }
    }
    
    if (!translation && !arabicText) {
        adicionarMensagemBotHTML(`
            <span class="greeting">⚠️ Erro de conexão</span>
            <div style="margin-top: 6px; line-height: 1.7;">
                Não foi possível carregar o versículo <strong>${surah}:${ayah}</strong>.<br>
                <a href="https://quran.com/pt/${surah}/${ayah}" target="_blank" style="color: var(--primary);">🔗 quran.com/pt/${surah}/${ayah}</a>
            </div>
        `);
        return;
    }
    
    if (!translation) translation = 'Tradução em português indisponível.';
    if (!arabicText) arabicText = '〔Texto em árabe não disponível〕';
    
    salvarNoHistorico();
    
    respostaAtual = {
        tipo: 'quran',
        surah: surah,
        ayah: ayah,
        arabic: arabicText,
        translation: translation
    };
    
    const html = `
        <span class="greeting">ótima pergunta! Aqui vai uma resposta sobre <span class="keyword">Alcorão ${surah}:${ayah}</span></span>
        <div class="quran-result">
            <span class="quran-ref">📖 Surah ${surah} : ${ayah}</span>
            <div class="quran-arabic">${arabicText}</div>
            <div class="quran-translation"><strong>Significado em Português:</strong><br>${translation}</div>
        </div>
        ${renderizarHistorico()}
    `;
    
    adicionarMensagemBotHTML(html);
}

// ==================== RESPONDER COM FORMATO ====================
function responderComFormato(entry, keyword) {
    salvarNoHistorico();
    
    respostaAtual = {
        tipo: 'cerebro',
        keyword: keyword,
        resposta: entry.resposta,
        fonte: entry.fonte
    };
    
    const respostaFormatada = entry.resposta.replace(/\n/g, '<br>');
    const safeKeyword = keyword || 'tema';
    
    const html = `
        <span class="greeting">ótima pergunta! Aqui vai uma resposta sobre <span class="keyword">${safeKeyword}</span></span>
        <div style="margin-top: 8px; line-height: 1.7;">
            ${respostaFormatada}
        </div>
        ${entry.fonte ? `<div style="margin-top: 10px; font-size: 0.8rem; color: var(--text-secondary); border-top: 1px solid var(--border); padding-top: 6px;">📚 Fonte: ${entry.fonte}</div>` : ''}
        ${renderizarHistorico()}
    `;
    
    adicionarMensagemBotHTML(html);
}

// ==================== RESPONDER SUPORTE ====================
function responderSuporte() {
    const html = `
        <span class="greeting">ótima pergunta! Aqui vai uma resposta sobre <span class="keyword">suporte</span></span>
        <div style="margin-top: 8px; line-height: 1.7;">

// ==================== RESPONDER NÃO ENCONTRADO ====================
function responderNaoEncontrado(texto) {

        <div style="margin-top: 8px; line-height: 1.7;">

                <li>Conceitos (halal, haram, sunnah, qibla, fiqh, aqidah)</li>

// ==================== HISTÓRICO ====================
function salvarNoHistorico() {
    if (respostaAtual) {
        historicoRespostas.unshift({
            ...respostaAtual,
            timestamp: new Date().toLocaleString('pt-MZ')
        });
        if (historicoRespostas.length > 10) historicoRespostas.pop();
    }
}

function renderizarHistorico() {
    if (historicoRespostas.length === 0) return '';
    
    let html = '<div class="previous-answers">';
    html += `<button class="prev-btn" onclick="toggleHistorico(this)">📜 Ver anteriores (${historicoRespostas.length})</button>`;
    html += '<div class="prev-list">';
    
    historicoRespostas.forEach((item) => {
        html += `<div class="prev-item">`;
        if (item.tipo === 'quran') {
            html += `<strong>Alcorão ${item.surah}:${item.ayah}</strong>`;
        } else {
            html += `<strong>${item.keyword || 'tema'}</strong>`;
        }
        html += `<small>${item.timestamp}</small>`;
        html += `</div>`;
    });
    
    html += '</div></div>';
    return html;
}

function toggleHistorico(btn) {
    const list = btn.nextElementSibling;
    list.classList.toggle('show');
    btn.textContent = list.classList.contains('show') 
        ? '🔼 Ocultar' 
        : `📜 Ver anteriores (${historicoRespostas.length})`;
}

// ==================== BUSCAR NO CÉREBRO — COM REMOÇÃO DE ACENTOS ====================
function encontrarNoCerebro(palavras) {
    const todosMatches = [];
    
    // Normaliza palavras do utilizador (remove acentos)
    const palavrasNormalizadas = palavras.map(p => removerAcentos(p));
    
    for (const entry of cerebro) {
        let score = 0;
        const keywords = entry.palavras_chave || [];
        let melhorKeyword = '';
        
        if (!keywords.length) continue;
        
        for (const palavra of palavrasNormalizadas) {
            for (const kw of keywords) {
                if (!kw) continue;
                
                // Compara com acentos removidos em ambos os lados
                const kwNormalizada = removerAcentos(kw);
                
                if (kwNormalizada === palavra) {
                    score += 3;
                    if (!melhorKeyword) melhorKeyword = kw;
                }
                else if (kwNormalizada.includes(palavra)) {
                    score += 2;
                    if (!melhorKeyword) melhorKeyword = kw;
                }
                else if (palavra.includes(kwNormalizada)) {
                    score += 1;
                    if (!melhorKeyword) melhorKeyword = kw;
                }
            }
        }
        
        if (score > 0) {
            todosMatches.push({
                entry: entry,
                score: score,
                melhorKeyword: melhorKeyword || keywords[0]
            });
        }
    }
    
    if (todosMatches.length === 0) return null;
    
    todosMatches.sort((a, b) => b.score - a.score);
    
    const melhor = todosMatches[0];
    
    if (todosMatches.length > 1 && todosMatches[1].score === melhor.score) {
        const empatados = todosMatches.filter(m => m.score === melhor.score);
        empatados.sort((a, b) => a.melhorKeyword.length - b.melhorKeyword.length);
        return empatados[0].entry;
    }
    
    return melhor.entry;
}

// ==================== UI HELPERS ====================
function adicionarMensagemUsuario(texto) {
    const div = document.createElement('div');
    div.className = 'message user';
    div.textContent = texto;
    document.getElementById('messages').appendChild(div);
    scrollToBottom();
}

function adicionarMensagemBotHTML(html) {
    const div = document.createElement('div');
    div.className = 'message bot';
    div.innerHTML = html;
    document.getElementById('messages').appendChild(div);
    scrollToBottom();
}

function mostrarDigitando() {
    const div = document.createElement('div');
    div.className = 'message bot typing';
    div.id = 'typingIndicator';
    div.innerHTML = '<span></span><span></span><span></span>';
    document.getElementById('messages').appendChild(div);
    scrollToBottom();
}

function esconderDigitando() {
    const el = document.getElementById('typingIndicator');
    if (el) el.remove();
}

function scrollToBottom() {
    const messages = document.getElementById('messages');
    messages.scrollTop = messages.scrollHeight;
}

window.toggleHistorico = toggleHistorico;
