<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Islam M - IA Islâmica Avançada</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
body{
    margin:0;
    font-family:Arial;
    background:#e8f5e9;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.chat{
    width:100%;
    max-width:600px;
    height:95vh;
    background:#fff;
    display:flex;
    flex-direction:column;
    border-radius:12px;
    overflow:hidden;
    box-shadow:0 10px 30px rgba(0,0,0,.2);
}

.header{
    background:#0b6623;
    color:#fff;
    padding:15px;
    display:flex;
    align-items:center;
    gap:10px;
}

.messages{
    flex:1;
    padding:15px;
    overflow-y:auto;
    background:#f4fbf7;
    display:flex;
    flex-direction:column;
    gap:10px;
}

.msg{
    padding:12px;
    border-radius:12px;
    max-width:85%;
    line-height:1.5;
}

.user{
    background:#0b6623;
    color:#fff;
    align-self:flex-end;
}

.bot{
    background:#fff;
    border:1px solid #ddd;
    align-self:flex-start;
}

.input{
    display:flex;
    padding:10px;
    border-top:1px solid #ddd;
}

input{
    flex:1;
    padding:12px;
    border-radius:20px;
    border:1px solid #ccc;
    outline:none;
}

button{
    margin-left:8px;
    width:45px;
    border:none;
    border-radius:50%;
    background:#0b6623;
    color:#fff;
}
</style>
</head>

<body>

<div class="chat">

<div class="header">
<i class="fa-solid fa-mosque"></i>
<strong>Islam M - IA Avançada</strong>
</div>

<div class="messages" id="msgs">
<div class="msg bot">
Assalamo Alaikum! Pergunte sobre Islam.
</div>
</div>

<div class="input">
<input id="txt" placeholder="Pergunte aqui...">
<button onclick="send()"><i class="fa fa-paper-plane"></i></button>
</div>

</div>

<script>

// ======================
// MEMÓRIA
// ======================
let memoria = [];
let contexto = "";

// ======================
// CÉREBRO
// ======================
const brain = [

{
keys:["allah","deus","criador"],
answer:"Allah é o único Deus, Criador de tudo.",
source:"Alcorão 112"
},

{
keys:["quran","alcorao"],
answer:"O Alcorão é a palavra de Allah revelada a Muhammad ﷺ.",
source:"Alcorão 2:2"
},

{
keys:["muhammad","profeta"],
answer:"Muhammad ﷺ é o último profeta de Allah.",
source:"Alcorão 33:40"
},

{
keys:["salah","reza","oração"],
answer:"Salah é a oração obrigatória 5 vezes ao dia.",
source:"Hadith Bukhari"
}

];

// ======================
// UTIL
// ======================
function norm(t){
return t.toLowerCase()
.normalize("NFD")
.replace(/[\u0300-\u036f]/g,"");
}

// ======================
// IA SIMPLES INTELIGENTE
// ======================
function think(input){

let text = norm(input);

if(text.length < 4 && contexto){
text += " " + norm(contexto);
}

let best = null;
let score = 0;

brain.forEach(item=>{
let s = 0;

item.keys.forEach(k=>{
if(text.includes(norm(k))){
s += 2;
}
});

if(s > score){
score = s;
best = item;
}
});

return best;
}

// ======================
// MENSAGEM
// ======================
function add(msg,type){

let div = document.createElement("div");
div.className = "msg " + type;
div.innerHTML = msg;
document.getElementById("msgs").appendChild(div);

document.getElementById("msgs")
.scrollTop = document.getElementById("msgs").scrollHeight;

}

// ======================
// ENVIAR
// ======================
function send(){

let input = document.getElementById("txt");
let text = input.value.trim();
if(!text) return;

add(text,"user");
memoria.push(text);
input.value = "";

// contexto simples
contexto = text;

setTimeout(()=>{

let r = think(text);

if(r){

add(`
${r.answer}
<br><br><small>Fonte: ${r.source}</small>
`,"bot");

}else{

add(`
Não encontrei resposta exata no meu cérebro.
<br><br>
Tente perguntar sobre: Alcorão, Salah, Hadith, Profetas.
`,"bot");

}

},800);

}

document.getElementById("txt")
.addEventListener("keydown",(e)=>{
if(e.key==="Enter") send();
});

</script>

</body>
</html>
