<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Islam M - Chat Bot Inteligente</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a5f2a 0%, #0d3b1a 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 10px;
        }

        .chat-container {
            width: 100%;
            max-width: 500px;
            height: 90vh;
            background: #fff;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .chat-header {
            background: linear-gradient(135deg, #2e8b57 0%, #1a5f2a 100%);
            color: white;
            padding: 20px;
            text-align: center;
        }

        .chat-header h1 {
            font-size: 1.5rem;
            margin-bottom: 5px;
        }

        .chat-header p {
            font-size: 0.8rem;
            opacity: 0.9;
        }

        .chat-header .status {
            font-size: 0.75rem;
            margin-top: 8px;
            padding: 4px 12px;
            background: rgba(255,255,255,0.2);
            border-radius: 20px;
            display: inline-block;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            background: #f5f5f5;
        }

        .message {
            margin-bottom: 15px;
            max-width: 85%;
            padding: 12px 16px;
            border-radius: 18px;
            font-size: 0.95rem;
            line-height: 1.5;
            word-wrap: break-word;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.bot {
            background: white;
            color: #333;
            border-bottom-left-radius: 4px;
            margin-right: auto;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .message.user {
            background: #2e8b57;
            color: white;
            border-bottom-right-radius: 4px;
            margin-left: auto;
        }

        .message.bot .sender {
            font-size: 0.75rem;
            color: #2e8b57;
            font-weight: bold;
            margin-bottom: 4px;
        }

        .message.user .sender {
            font-size: 0.75rem;
            color: rgba(255,255,255,0.8);
            font-weight: bold;
            margin-bottom: 4px;
        }

        .message.bot.pensando {
            opacity: 0.7;
            font-style: italic;
        }

        .loading-dots {
            display: inline-flex;
            gap: 4px;
        }

        .loading-dots span {
            width: 8px;
            height: 8px;
            background: #2e8b57;
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out both;
        }

        .loading-dots span:nth-child(1) { animation-delay: -0.32s; }
        .loading-dots span:nth-child(2) { animation-delay: -0.16s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }

        .chat-input-area {
            padding: 15px;
            background: white;
            border-top: 1px solid #e0e0e0;
            display: flex;
            gap: 10px;
        }

        .chat-input {
            flex: 1;
            padding: 12px 18px;
            border: 2px solid #e0e0e0;
            border-radius: 25px;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.3s;
        }

        .chat-input:focus {
            border-color: #2e8b57;
        }

        .chat-input:disabled {
            background: #f0f0f0;
            cursor: not-allowed;
        }

        .send-btn {
            width: 50px;
            height: 50px;
            border: none;
            border-radius: 50%;
            background: #2e8b57;
            color: white;
            font-size: 1.2rem;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .send-btn:hover:not(:disabled) {
            background: #1a5f2a;
            transform: scale(1.05);
        }

        .send-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .footer {
            text-align: center;
            padding: 10px;
            background: #1a5f2a;
            color: white;
            font-size: 0.75rem;
        }

        .footer a {
            color: #90ee90;
            text-decoration: none;
        }

        .chat-messages::-webkit-scrollbar {
            width: 6px;
        }

        .chat-messages::-webkit-scrollbar-track {
            background: #f1f1f1;
        }

        .chat-messages::-webkit-scrollbar-thumb {
            background: #2e8b57;
            border-radius: 3px;
        }

        @media (max-width: 480px) {
            .chat-container {
                height: 100vh;
                border-radius: 0;
            }
            body {
                padding: 0;
            }
        }
    </style>
<base target="_blank">
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">
            <h1>🕌 Islam M</h1>
            <p>Chat Bot Inteligente sobre o Islam</p>
            <div class="status" id="status">⏳ Carregando cerebro...</div>
        </div>

        <div class="chat-messages" id="chatMessages">
        </div>

        <div class="chat-input-area">
            <input 
                type="text" 
                class="chat-input" 
                id="userInput" 
                placeholder="Escreva a sua pergunta..." 
                disabled
            >
            <button class="send-btn" id="sendBtn" disabled>➤</button>
        </div>

        <div class="footer">
            Criado por <strong>isslam Moz</strong> | Suporte: 860407269 | 
            <a href="#" onclick="mostrarApoio(); return false;">💚 Apoiar Projeto</a>
        </div>
    </div>

    <script>
        // ============================================
        // CONFIGURAÇÃO
        // ============================================
        const CONFIG = {
            GEMINI_API_KEY: 'SUA_CHAVE_AQUI',
            MENSAGENS: {
                BOAS_VINDAS: 'Assalamu Alaikum! Sou Islam M, seu guia sobre o Islam. Pergunte sobre: Shahada, Oração, Jejum, Alcorão, Profetas, e muito mais!',
                SEM_RESPOSTA: 'Ainda não sei responder isso. Tente perguntar sobre outros temas do Islam!',
                ERRO: 'Desculpe, ocorreu um erro. Tente novamente.',
                SUGESTAO: '💡 Tente perguntar: o que é Islam? | como rezar? | 5 pilares? | shahada?'
            }
        };

        // ============================================
        // CÉREBRO DO BOT (JSON embutido)
        // ============================================
        let cerebro = [];

        // ============================================
        // VARIÁVEIS GLOBAIS
        // ============================================
        const chatMessages = document.getElementById('chatMessages');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');
        const statusDiv = document.getElementById('status');

        let cerebroPronto = false;

        // ============================================
        // FUNÇÕES DE NORMALIZAÇÃO E BUSCA FUZZY
        // ============================================

        function normalizarTexto(texto) {
            if (!texto) return '';
            return texto
                .toLowerCase()
                .normalize('NFD')
                .replace(/[̀-̏̐-̟]/g, '')
                .replace(/[çÇ]/g, 'c')
                .replace(/[ñÑ]/g, 'n')
                .replace(/[^a-z0-9\s]/g, '')
                .replace(/\s+/g, ' ')
                .trim();
        }

        function distanciaLevenshtein(str1, str2) {
            const m = str1.length, n = str2.length;
            const dp = Array.from({length: m + 1}, () => new Array(n + 1).fill(0));
            for (let i = 0; i <= m; i++) dp[i][0] = i;
            for (let j = 0; j <= n; j++) dp[0][j] = j;
            for (let i = 1; i <= m; i++) {
                for (let j = 1; j <= n; j++) {
                    if (str1[i - 1] === str2[j - 1]) dp[i][j] = dp[i - 1][j - 1];
                    else dp[i][j] = 1 + Math.min(dp[i - 1][j], dp[i][j - 1], dp[i - 1][j - 1]);
                }
            }
            return dp[m][n];
        }

        function similaridade(str1, str2) {
            const maxLen = Math.max(str1.length, str2.length);
            if (maxLen === 0) return 1;
            return 1 - (distanciaLevenshtein(str1, str2) / maxLen);
        }

        function buscarNoCerebro(pergunta) {
            const perguntaNorm = normalizarTexto(pergunta);
            const palavrasPergunta = perguntaNorm.split(' ').filter(p => p.length > 2);
            let melhorMatch = null;
            let melhorPontuacao = 0;
            const LIMIAR = 0.75;

            for (const conhecimento of cerebro) {
                if (!conhecimento.palavras_chave || !Array.isArray(conhecimento.palavras_chave)) continue;
                let pontuacao = 0, matchesExatos = 0, matchesParciais = 0;

                for (const keyword of conhecimento.palavras_chave) {
                    const keywordNorm = normalizarTexto(keyword);
                    if (perguntaNorm === keywordNorm) { pontuacao += 100; matchesExatos++; continue; }
                    if (perguntaNorm.includes(keywordNorm) || keywordNorm.includes(perguntaNorm)) { pontuacao += 50; matchesParciais++; continue; }
                    for (const palavra of palavrasPergunta) {
                        if (palavra === keywordNorm) { pontuacao += 40; matchesExatos++; }
                        else if (keywordNorm.includes(palavra) || palavra.includes(keywordNorm)) { pontuacao += 20; matchesParciais++; }
                        else {
                            const sim = similaridade(palavra, keywordNorm);
                            if (sim >= LIMIAR) pontuacao += sim * 30;
                        }
                    }
                }
                if (matchesExatos > 1) pontuacao *= 1.5;
                if (matchesParciais > 2) pontuacao *= 1.2;
                if (pontuacao > melhorPontuacao) { melhorPontuacao = pontuacao; melhorMatch = conhecimento; }
            }
            return melhorPontuacao >= 20 ? melhorMatch : null;
        }

        // ============================================
        // EFEITO DE DIGITAÇÃO E DELAY
        // ============================================

        const FRASES_TRANSICAO = [
            "Deixa-me ver...", "Hmm, interessante pergunta...", "Vou procurar no meu conhecimento...",
            "Deixa-me confirmar isso...", "Bom ponto! Vejamos...", "Estou a consultar...",
            "Vamos lá...", "Deixa-me pensar nisso...", "Interessante! Deixa-me verificar...",
            "Vou buscar a melhor resposta..."
        ];

        function getFraseTransicao() {
            return FRASES_TRANSICAO[Math.floor(Math.random() * FRASES_TRANSICAO.length)];
        }

        function simularPensamento() {
            const delay = Math.floor(Math.random() * 2000) + 3000;
            return new Promise((resolve) => {
                const div = document.createElement('div');
                div.className = 'message bot pensando';
                div.id = 'msgPensando';
                div.innerHTML = `<div class="sender">🕌 Islam M está a escrever...</div><div class="loading-dots"><span></span><span></span><span></span></div>`;
                chatMessages.appendChild(div);
                scrollToBottom();
                setTimeout(() => { const msg = document.getElementById('msgPensando'); if (msg) msg.remove(); resolve(); }, delay);
            });
        }

        function adicionarMensagemBotDigitando(texto, velocidade = 25) {
            const div = document.createElement('div');
            div.className = 'message bot';
            div.innerHTML = `<div class="sender">🕌 Islam M</div><div class="texto-digitando"></div>`;
            chatMessages.appendChild(div);
            scrollToBottom();
            const elementoTexto = div.querySelector('.texto-digitando');
            let i = 0;
            return new Promise((resolve) => {
                const intervalo = setInterval(() => {
                    if (i < texto.length) {
                        elementoTexto.innerHTML = formatarTexto(texto.substring(0, i + 1));
                        i++;
                        if (i % 3 === 0) scrollToBottom();
                    } else {
                        clearInterval(intervalo);
                        elementoTexto.innerHTML = formatarTexto(texto);
                        resolve(div);
                    }
                }, velocidade);
            });
        }

        // ============================================
        // FUNÇÕES DA UI
        // ============================================

        function habilitarInput() { userInput.disabled = false; sendBtn.disabled = false; userInput.focus(); }
        function desabilitarInput() { userInput.disabled = true; sendBtn.disabled = true; }

        function adicionarMensagemBot(texto) {
            const div = document.createElement('div');
            div.className = 'message bot';
            div.innerHTML = `<div class="sender">🕌 Islam M</div><div>${formatarTexto(texto)}</div>`;
            chatMessages.appendChild(div);
            scrollToBottom();
        }

        function adicionarMensagemUser(texto) {
            const div = document.createElement('div');
            div.className = 'message user';
            div.innerHTML = `<div class="sender">Você</div><div>${formatarTexto(texto)}</div>`;
            chatMessages.appendChild(div);
            scrollToBottom();
        }

        function formatarTexto(texto) {
            return texto.replace(/(https?:\/\/[^\s]+)/g, '<a href="$1" target="_blank" style="color:#2e8b57;">$1</a>').replace(/
/g, '<br>');
        }

        function scrollToBottom() { chatMessages.scrollTop = chatMessages.scrollHeight; }

        function mostrarApoio() {
            adicionarMensagemBot('💚 Para apoiar o projeto Islam M, contacte-nos no WhatsApp 860407269 ou visite https://Facebook.com/Islamguia');
        }

        // ============================================
        // LÓGICA DO CHAT
        // ============================================

        async function processarPergunta(pergunta) {
            const match = buscarNoCerebro(pergunta);
            if (match) {
                const frase = getFraseTransicao();
                return { origem: 'cerebro', resposta: frase + "\n\n" + match.resposta };
            }
            return { origem: 'padrao', resposta: CONFIG.MENSAGENS.SEM_RESPOSTA + "\n\n" + CONFIG.MENSAGENS.SUGESTAO };
        }

        async function enviarPergunta() {
            const pergunta = userInput.value.trim();
            if (!pergunta) return;
            userInput.value = '';
            adicionarMensagemUser(pergunta);
            desabilitarInput();
            try {
                await simularPensamento();
                const resultado = await processarPergunta(pergunta);
                await adicionarMensagemBotDigitando(resultado.resposta);
            } catch (erro) {
                adicionarMensagemBot('❌ ' + CONFIG.MENSAGENS.ERRO);
                console.error(erro);
            }
            habilitarInput();
            userInput.focus();
        }

        // ============================================
        // CARREGAR CÉREBRO
        // ============================================

        async function carregarCerebro() {
            try {
                const resposta = await fetch('islam_chatbot_data_v1.4.json');
                if (!resposta.ok) throw new Error('Arquivo não encontrado');
                const dados = await resposta.json();
                cerebro = dados.filter(item => !item._meta);
                return true;
            } catch (erro) {
                console.error('Erro ao carregar cerebro:', erro);
                return false;
            }
        }

        // ============================================
        // INICIALIZAÇÃO
        // ============================================

        async function iniciarBot() {
            adicionarMensagemBot(CONFIG.MENSAGENS.BOAS_VINDAS);
            const sucesso = await carregarCerebro();
            if (sucesso) {
                cerebroPronto = true;
                statusDiv.textContent = `✅ Online! ${cerebro.length} conhecimentos carregados`;
                statusDiv.style.background = 'rgba(46, 139, 87, 0.3)';
            } else {
                statusDiv.textContent = '⚠️ Cérebro offline - Verifique o arquivo JSON';
                statusDiv.style.background = 'rgba(255, 165, 0, 0.3)';
            }
            habilitarInput();
        }

        sendBtn.addEventListener('click', enviarPergunta);
        userInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') enviarPergunta(); });

        iniciarBot();
    </script>
</body>
</html>
