<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Islam M - Chatbot Educacional</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a5f2a 0%, #0d3320 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .chat-container {
            width: 100%;
            max-width: 600px;
            background: rgba(255,255,255,0.95);
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        .chat-header {
            background: linear-gradient(135deg, #2d8a3e 0%, #1a5f2a 100%);
            color: white;
            padding: 20px;
            text-align: center;
        }
        .chat-header h1 { font-size: 24px; margin-bottom: 5px; }
        .chat-header p { opacity: 0.9; font-size: 14px; }
        .chat-messages {
            height: 400px;
            overflow-y: auto;
            padding: 20px;
            background: #f8f9fa;
        }
        .message {
            margin-bottom: 15px;
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 15px;
            line-height: 1.5;
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .message.user {
            background: #2d8a3e;
            color: white;
            margin-left: auto;
            border-bottom-right-radius: 5px;
        }
        .message.bot {
            background: white;
            color: #333;
            border-bottom-left-radius: 5px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .message.bot .origem {
            font-size: 11px;
            color: #666;
            margin-top: 5px;
            font-style: italic;
        }
        .chat-input {
            display: flex;
            padding: 15px;
            background: white;
            border-top: 1px solid #eee;
        }
        .chat-input input {
            flex: 1;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 25px;
            outline: none;
            font-size: 14px;
            transition: border-color 0.3s;
        }
        .chat-input input:focus {
            border-color: #2d8a3e;
        }
        .chat-input button {
            margin-left: 10px;
            padding: 12px 20px;
            background: #2d8a3e;
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.3s;
        }
        .chat-input button:hover {
            background: #1a5f2a;
        }
        .chat-input button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        .loading {
            text-align: center;
            color: #666;
            padding: 10px;
            font-style: italic;
        }
        .status {
            text-align: center;
            padding: 5px;
            font-size: 12px;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">
            <h1>🤖 Islam M</h1>
            <p>Chatbot Educacional sobre o Islam</p>
        </div>
        <div class="chat-messages" id="messages"></div>
        <div class="status" id="status">Carregando...</div>
        <div class="chat-input">
            <input type="text" id="userInput" placeholder="Pergunte sobre o Islam..." disabled>
            <button id="sendBtn" disabled>Enviar</button>
        </div>
    </div>

    <!-- 
        INJEÇÃO DE VARIÁVEIS DE AMBIENTE
        Em produção, estas variáveis devem ser injetadas pelo servidor
        ou pelo sistema de build (Webpack, Vite, etc.)
    -->
    <script>
        // Configuração injetada (em produção, use processo de build)
        window.ENV = {
            BOT_NOME: 'Islam M',
            BOT_VERSAO: '1.0.0',
            BOT_AUTOR: 'isslam Moz',
            BOT_SUPORTE: '860407269',
            URL_CEREBRO: 'https://raw.githubusercontent.com/islammocambique-maker/Bot-IslamM/main/cerebro.json',
            GEMINI_API_KEY: 'SUA_CHAVE_AQUI', // ⚠️ SUBSTITUA EM PRODUÇÃO
            GEMINI_MODEL: 'gemini-1.5-flash',
            GEMINI_ATIVO: 'true',
            BUSCA_LIMITE_PALAVRAS: '1',
            BUSCA_SIMILARIDADE_MINIMA: '0.1',
            BUSCA_MAX_RESULTADOS: '1',
            APOIO_MPESA: '1228803 (Paga Fácil) / 860407269',
            APOIO_EMOLA: '860407269',
            APOIO_BIM_NIB: '000100000012473356257'
        };
    </script>

    <script src="config-loader.js"></script>
    <script src="bot-islamm-seguro.js"></script>
    <script>
        const messagesDiv = document.getElementById('messages');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');
        const statusDiv = document.getElementById('status');

        // Adiciona mensagem ao chat
        function addMessage(text, isUser = false, origem = '') {
            const div = document.createElement('div');
            div.className = `message ${isUser ? 'user' : 'bot'}`;
            div.innerHTML = text.replace(/\n/g, '<br>');
            if (origem && !isUser) {
                div.innerHTML += `<div class="origem">Fonte: ${origem}</div>`;
            }
            messagesDiv.appendChild(div);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        // Inicializa o chatbot
        async function init() {
            statusDiv.textContent = 'Carregando cérebro...';
            const carregado = await BotIslamM.carregarCerebro();
            
            if (carregado) {
                statusDiv.textContent = `✅ Cérebro carregado! ${BotIslamM.getEstatisticas().total} conhecimentos`;
                addMessage(BotIslamM.getBoasVindas());
                userInput.disabled = false;
                sendBtn.disabled = false;
                userInput.focus();
            } else {
                statusDiv.textContent = '⚠️ Erro ao carregar cérebro. Usando apenas Gemini.';
                addMessage(BotIslamM.getBoasVindas());
                userInput.disabled = false;
                sendBtn.disabled = false;
            }
        }

        // Envia mensagem
        async function sendMessage() {
            const text = userInput.value.trim();
            if (!text) return;

            addMessage(text, true);
            userInput.value = '';
            userInput.disabled = true;
            sendBtn.disabled = true;
            statusDiv.textContent = 'Processando...';

            try {
                const resposta = await BotIslamM.processarPergunta(text);
                addMessage(resposta.resposta, false, resposta.origem);
                statusDiv.textContent = `Resposta de: ${resposta.origem} (confiança: ${resposta.confianca})`;
            } catch (erro) {
                addMessage('Erro ao processar pergunta. Tente novamente.');
                statusDiv.textContent = 'Erro no processamento';
            }

            userInput.disabled = false;
            sendBtn.disabled = false;
            userInput.focus();
        }

        // Event listeners
        sendBtn.addEventListener('click', sendMessage);
        userInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });

        // Inicia
        init();
    </script>
</body>
</html>
